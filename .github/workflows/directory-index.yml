name: Generate Directory Index

on:
  push:
    paths:
      - 'micro-experiences/**'

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index.html
        run: |
          DIR="micro-experiences"

          cat > "$DIR/index.html" <<'HEADER'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Micro Experiences</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
          </head>
          <body>
            <div class="container py-5">
              <h1 class="mb-1">🧪 Micro Experiences</h1>
              <p class="text-muted mb-4" id="count"></p>
              <div class="row g-4">
          HEADER

          COUNT=0

          for project in "$DIR"/*/; do
            [ -f "$project/index.html" ] || continue

            name=$(basename "$project")

            # ── Git metadata ──────────────────────────────
            last_date=$(git log -1 --format=%cs -- "$project")
            last_date_human=$(echo "$last_date" | cut -c1-7)

            first_date=$(git log --reverse --format=%cs -- "$project" | head -1)
            first_date_human=$(echo "$first_date" | cut -c1-7)

            last_message=$(git log -1 --format=%s -- "$project" | sed 's/"/\&quot;/g; s/</\&lt;/g; s/>/\&gt;/g')

            commit_count=$(git rev-list --count HEAD -- "$project")

            # ── HTML parsing ─────────────────────────────
            title=$(grep -oPi '(?<=<title>).*?(?=</title>)' "$project/index.html" | head -1 | sed 's/^ *//;s/ *$//')

            description=$(grep -oPi '<meta\s+name=["\x27]description["\x27]\s+content=["\x27]\K[^"\x27]*' "$project/index.html" | head -1)

            if [ -z "$title" ]; then
              title=$(echo "$name" | sed 's/[-_]/ /g' | sed 's/\b\w/\U&/g')
            fi

            # ── Thumbnail ────────────────────────────────
            thumb=""
            for img in thumbnail.png thumbnail.jpg thumbnail.webp og-image.png screenshot.png; do
              if [ -f "$project/$img" ]; then
                thumb="$name/$img"
                break
              fi
            done

            # ── Tech stack detection ─────────────────────
            tags=""
            [ -f "$project/package.json" ] && tags="$tags node"
            grep -qli "react" "$project"/*.js "$project"/*.html 2>/dev/null && tags="$tags react"
            grep -qli "three" "$project"/*.js "$project"/*.html 2>/dev/null && tags="$tags three.js"
            grep -qli "canvas" "$project"/*.js "$project"/*.html 2>/dev/null && tags="$tags canvas"
            grep -qli "webgl" "$project"/*.js "$project"/*.html 2>/dev/null && tags="$tags webgl"
            grep -qli "p5" "$project"/*.js "$project"/*.html 2>/dev/null && tags="$tags p5.js"
            ls "$project"/*.ts &>/dev/null && tags="$tags typescript"

            # ── File stats ───────────────────────────────
            file_count=$(find "$project" -type f | wc -l | tr -d ' ')

            # ── Build card HTML ──────────────────────────
            cat >> "$DIR/index.html" <<CARD
                <div class="col-sm-6 col-lg-4">
                  <a href="/micro-experiences/$name/" class="text-decoration-none">
                    <div class="card h-100 shadow-sm">
          CARD

            if [ -n "$thumb" ]; then
              echo "              <img src=\"$thumb\" class=\"card-img-top\" alt=\"$title\" loading=\"lazy\" style=\"height:180px;object-fit:cover;\">" >> "$DIR/index.html"
            else
              echo "              <div class=\"card-img-top bg-secondary bg-gradient d-flex align-items-center justify-content-center text-white\" style=\"height:180px;font-size:2.5rem;\">🧪</div>" >> "$DIR/index.html"
            fi

            cat >> "$DIR/index.html" <<CARD
                      <div class="card-body">
                        <h5 class="card-title text-dark">$title</h5>
          CARD

            if [ -n "$description" ]; then
              echo "                    <p class=\"card-text text-muted small\">$description</p>" >> "$DIR/index.html"
            fi

            cat >> "$DIR/index.html" <<CARD
                      </div>
                      <div class="card-footer bg-transparent">
                        <small class="text-muted">latest change: $last_date_human</small>
                        <small class="text-muted float-end">$commit_count commits · $file_count files</small>
                      </div>
          CARD

            if [ -n "$tags" ]; then
              echo "                  <div class=\"card-footer bg-transparent border-top-0 pt-0\">" >> "$DIR/index.html"
              for tag in $tags; do
                echo "                    <span class=\"badge bg-light text-dark border me-1\">$tag</span>" >> "$DIR/index.html"
              done
              echo "                  </div>" >> "$DIR/index.html"
            fi

            cat >> "$DIR/index.html" <<CARD
                    </div>
                  </a>
                </div>
          CARD

            COUNT=$((COUNT + 1))
          done

          cat >> "$DIR/index.html" <<FOOTER
              </div>
            </div>
            <script>
              document.getElementById('count').textContent = '$COUNT projects';
            </script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
          </body>
          </html>
          FOOTER

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add micro-experiences/index.html
          git diff --cached --quiet || git commit -m "chore: auto-update micro-experiences index"
          git push
