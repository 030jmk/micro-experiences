name: Generate Directory Index

on:
  push:
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index.html
        shell: bash
        run: |
          echo "Starting generation..."
          echo "Current directory: $(pwd)"
          echo "Folders found:"
          ls -d */

          # Start the file
          cat > index.html <<'HTMLHEADER'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Micro Experiences</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
          </head>
          <body>
            <div class="container py-5">
              <h1 class="mb-1">🧪 Micro Experiences</h1>
              <p class="text-muted mb-4" id="count"></p>
              <div class="row g-4">
          HTMLHEADER

          COUNT=0

          for project in */; do
            case "$project" in
              .github/|node_modules/) continue ;;
            esac

            if [ ! -f "${project}index.html" ]; then
              echo "Skipping $project - no index.html"
              continue
            fi

            name=$(basename "$project")
            echo "Processing: $name"

            last_date=$(git log -1 --format=%cs -- "$project" 2>/dev/null || echo "unknown")
            last_date_human=$(echo "$last_date" | cut -c1-7)
            commit_count=$(git rev-list --count HEAD -- "$project" 2>/dev/null || echo "0")
            file_count=$(find "$project" -type f | wc -l | tr -d ' ')

            title=$(grep -oPi '(?<=<title>).*?(?=</title>)' "${project}index.html" 2>/dev/null | head -1 | sed 's/^ *//;s/ *$//')
            description=$(grep -oPi '<meta\s+name="description"\s+content="\K[^"]*' "${project}index.html" 2>/dev/null | head -1)

            if [ -z "$title" ]; then
              title=$(echo "$name" | sed 's/[-_]/ /g' | sed 's/\b\w/\U&/g')
            fi

            thumb=""
            for img in thumbnail.png thumbnail.jpg thumbnail.webp og-image.png screenshot.png; do
              if [ -f "${project}${img}" ]; then
                thumb="${name}/${img}"
                break
              fi
            done

            if [ -n "$thumb" ]; then
              THUMB_HTML="<img src=\"${thumb}\" class=\"card-img-top\" alt=\"${title}\" loading=\"lazy\" style=\"height:180px;object-fit:cover;\">"
            else
              THUMB_HTML="<div class=\"card-img-top bg-secondary bg-gradient d-flex align-items-center justify-content-center text-white\" style=\"height:180px;font-size:2.5rem;\">🧪</div>"
            fi

            DESC_HTML=""
            if [ -n "$description" ]; then
              DESC_HTML="<p class=\"card-text text-muted small\">${description}</p>"
            fi

            cat >> index.html <<HTMLCARD
                <div class="col-sm-6 col-lg-4">
                  <a href="${name}/" class="text-decoration-none">
                    <div class="card h-100 shadow-sm">
                      ${THUMB_HTML}
                      <div class="card-body">
                        <h5 class="card-title text-dark">${title}</h5>
                        ${DESC_HTML}
                      </div>
                      <div class="card-footer bg-transparent">
                        <small class="text-muted">latest change: ${last_date_human}</small>
                        <small class="text-muted float-end">${commit_count} commits · ${file_count} files</small>
                      </div>
                    </div>
                  </a>
                </div>
          HTMLCARD

            COUNT=$((COUNT + 1))
          done

          cat >> index.html <<HTMLFOOTER
              </div>
            </div>
            <script>
              document.getElementById('count').textContent = '${COUNT} projects';
            </script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
          </body>
          </html>
          HTMLFOOTER

          echo "Generated index.html with ${COUNT} projects"
          cat index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git status
          git diff --cached --quiet || git commit -m "chore: auto-update index"
          git push
