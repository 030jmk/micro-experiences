name: Generate Directory Index

on:
  push:
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - Show structure
        run: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== All folders ==="
          ls -la
          echo ""
          echo "=== All folders with index.html ==="
          for project in */; do
            echo "Checking: $project"
            if [ -f "$project/index.html" ]; then
              echo "  ✅ Has index.html"
            else
              echo "  ❌ No index.html"
            fi
          done

      - name: Generate index.html
        run: |
          # ... (the full generation script from before)
          echo "done generating"

      - name: Debug - Verify file was created
        run: |
          echo "=== Does index.html exist? ==="
          ls -la index.html
          echo ""
          echo "=== First 20 lines ==="
          head -20 index.html
          echo ""
          echo "=== Git status ==="
          git status

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          echo "=== Git status after add ==="
          git status
          git diff --cached --quiet || git commit -m "chore: auto-update index"
          git push
