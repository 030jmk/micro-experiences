name: Generate Directory Index

on:
  push:
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Generate screenshots and index.html
        run: |
          python3 <<'PYSCRIPT'
          import os
          import re
          import subprocess
          import urllib.parse
          from playwright.sync_api import sync_playwright

          # Create assets folder
          os.makedirs('assets/screenshots', exist_ok=True)

          def take_screenshot(project_name, output_path):
              """Screenshot the live GitHub Pages site"""
              url = f'https://jan.kopankiewicz.de/micro-experiences/{urllib.parse.quote(project_name)}/'
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch()
                      page = browser.new_page(viewport={'width': 1280, 'height': 720})
                      page.goto(url, wait_until='networkidle', timeout=30000)
                      page.wait_for_timeout(2000)
                      page.screenshot(path=output_path)
                      browser.close()
                  print(f"  ✅ Screenshot saved: {output_path}")
                  return True
              except Exception as e:
                  print(f"  ❌ Screenshot failed: {e}")
                  return False

          projects = []

          for entry in sorted(os.listdir('.')):
              if not os.path.isdir(entry):
                  continue
              if entry.startswith('.') or entry in ('node_modules', 'assets'):
                  continue
              if not os.path.isfile(os.path.join(entry, 'index.html')):
                  print(f"Skipping {entry} - no index.html")
                  continue

              print(f"Processing: {entry}")

              # Git metadata
              try:
                  last_date = subprocess.check_output(
                      ['git', 'log', '-1', '--format=%cs', '--', entry],
                      stderr=subprocess.DEVNULL
                  ).decode().strip()
              except:
                  last_date = 'unknown'

              last_date_human = last_date[:7] if len(last_date) >= 7 else last_date

              try:
                  commit_count = subprocess.check_output(
                      ['git', 'rev-list', '--count', 'HEAD', '--', entry],
                      stderr=subprocess.DEVNULL
                  ).decode().strip()
              except:
                  commit_count = '0'

              file_count = sum(len(files) for _, _, files in os.walk(entry))

              # Parse HTML
              index_path = os.path.join(entry, 'index.html')
              with open(index_path, 'r', encoding='utf-8', errors='ignore') as f:
                  html = f.read()

              title_match = re.search(r'<title>(.*?)</title>', html, re.IGNORECASE | re.DOTALL)
              title = title_match.group(1).strip() if title_match else None

              desc_match = re.search(r'<meta\s+name=["\']description["\']\s+content=["\']([^"\']*)["\']', html, re.IGNORECASE)
              description = desc_match.group(1).strip() if desc_match else None

              if not title:
                  title = entry.replace('-', ' ').replace('_', ' ').title()

              # Screenshot - saved to assets folder
              safe_name = entry.replace(' ', '-').lower()
              screenshot_path = f'assets/screenshots/{safe_name}.png'
              has_screenshot = take_screenshot(entry, screenshot_path)

              if has_screenshot:
                  thumb = f'assets/screenshots/{safe_name}.png'
              else:
                  thumb = None

              projects.append({
                  'name': entry,
                  'encoded_name': urllib.parse.quote(entry),
                  'title': title,
                  'description': description,
                  'last_date': last_date_human,
                  'commit_count': commit_count,
                  'file_count': file_count,
                  'thumb': thumb,
              })

          # Build HTML
          cards = ''
          for p in projects:
              if p['thumb']:
                  thumb_html = f'<img src="{p["thumb"]}" class="card-img-top" alt="" loading="lazy" style="height:180px;object-fit:cover;">'
              else:
                  thumb_html = '<div class="card-img-top bg-secondary bg-gradient d-flex align-items-center justify-content-center text-white" style="height:180px;font-size:2.5rem;">🧪</div>'

              desc_html = f'<p class="card-text text-muted small">{p["description"]}</p>' if p['description'] else ''

              cards += f'''
                <div class="col-sm-6 col-lg-4">
                  <a href="{p['encoded_name']}/" class="text-decoration-none">
                    <div class="card h-100 shadow-sm">
                      {thumb_html}
                      <div class="card-body">
                        <h5 class="card-title text-dark">{p['title']}</h5>
                        {desc_html}
                      </div>
                      <div class="card-footer bg-transparent">
                        <small class="text-muted">latest change: {p['last_date']}</small>
                        <small class="text-muted float-end">{p['commit_count']} commits &middot; {p['file_count']} files</small>
                      </div>
                    </div>
                  </a>
                </div>'''

          html_out = f'''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Jan's Micro Experience Sites</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
          </head>
          <body>
            <div class="container py-5">
              <h1 class="mb-1">Micro Experience Sites</h1>
              <p class="text-muted mb-4">{len(projects)} projects</p>
              <div class="row g-4">
                {cards}
              </div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
          </body>
          </html>'''

          with open('index.html', 'w') as f:
              f.write(html_out)

          print(f"\nGenerated index.html with {len(projects)} projects")
          PYSCRIPT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git add assets/screenshots/
          git diff --cached --quiet || git commit -m "chore: auto-update index with screenshots"
          git push
