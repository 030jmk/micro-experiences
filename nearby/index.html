<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nearby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #c8f53d;
    --text: #f0f0f0;
    --muted: #666;
    --pill-h: 56px;
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
height: 100vh;
height: 100dvh;
display: flex;
flex-direction: column;
overflow: hidden;
}

header {
padding: 20px 20px 12px;
display: flex;
align-items: baseline;
gap: 10px;
z-index: 10;
flex-shrink: 0;
}

header h1 {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 28px;
letter-spacing: -1px;
color: var(–accent);
}

header span {
font-size: 11px;
color: var(–muted);
letter-spacing: 0.1em;
}

/* Map */
#map-wrap {
flex: 1 1 0;
min-height: 0;
position: relative;
}

#map {
width: 100%;
height: 100%;
}

/* Override Leaflet tile background */
.leaflet-container {
background: #1a1a1a;
}

/* Bottom sheet */
#sheet {
flex-shrink: 0;
background: var(–surface);
border-top: 1px solid var(–border);
display: flex;
flex-direction: column;
height: 230px;
transition: height 0.35s cubic-bezier(.4,0,.2,1);
}

#sheet.expanded { height: 60vh; height: 60dvh; }

#sheet-handle {
display: flex;
justify-content: center;
padding: 10px 0 6px;
cursor: pointer;
flex-shrink: 0;
}

#sheet-handle::before {
content: ‘’;
width: 36px; height: 4px;
border-radius: 2px;
background: var(–border);
}

#category-row {
display: flex;
gap: 8px;
padding: 0 16px 12px;
overflow-x: auto;
scrollbar-width: none;
flex-shrink: 0;
}

#category-row::-webkit-scrollbar { display: none; }

.cat-btn {
border: 1px solid var(–border);
background: transparent;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 11px;
padding: 5px 12px;
border-radius: 20px;
cursor: pointer;
white-space: nowrap;
transition: all 0.15s;
}

.cat-btn.active {
background: var(–accent);
border-color: var(–accent);
color: #000;
font-weight: 500;
}

#poi-list {
flex: 1;
overflow-y: auto;
padding: 0 16px 20px;
scrollbar-width: none;
}

#poi-list::-webkit-scrollbar { display: none; }

.poi-item {
display: flex;
align-items: center;
gap: 14px;
padding: 11px 0;
border-bottom: 1px solid var(–border);
cursor: pointer;
transition: opacity 0.15s;
}

.poi-item:active { opacity: 0.6; }
.poi-item:last-child { border-bottom: none; }

.poi-icon {
width: 38px; height: 38px;
border-radius: 10px;
background: var(–border);
display: flex; align-items: center; justify-content: center;
font-size: 18px;
flex-shrink: 0;
}

.poi-info { flex: 1; min-width: 0; }

.poi-name {
font-size: 13px;
font-weight: 500;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.poi-meta {
font-size: 11px;
color: var(–muted);
margin-top: 2px;
}

.poi-dist {
font-size: 11px;
color: var(–accent);
flex-shrink: 0;
}

/* Status bar */
#status {
position: absolute;
top: 12px; left: 50%; transform: translateX(-50%);
background: rgba(13,13,13,0.85);
backdrop-filter: blur(8px);
border: 1px solid var(–border);
border-radius: 20px;
padding: 6px 14px;
font-size: 11px;
color: var(–muted);
z-index: 999;
white-space: nowrap;
pointer-events: none;
transition: opacity 0.4s;
}

#status.hidden { opacity: 0; }

/* Locate button */
#locate-btn {
position: absolute;
bottom: 16px; right: 16px;
width: 44px; height: 44px;
border-radius: 12px;
background: var(–surface);
border: 1px solid var(–border);
color: var(–accent);
font-size: 20px;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
z-index: 999;
box-shadow: 0 4px 16px rgba(0,0,0,0.5);
transition: transform 0.15s;
}

#locate-btn:active { transform: scale(0.93); }

.empty {
text-align: center;
color: var(–muted);
font-size: 12px;
padding: 30px 0;
}

/* Leaflet dark overrides */
.leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(0.9); }
.leaflet-popup-content-wrapper {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}
.leaflet-popup-content { color: var(–text); font-family: ‘DM Mono’, monospace; font-size: 12px; margin: 10px 14px; }
.leaflet-popup-tip { background: var(–surface); }
.leaflet-popup-close-button { color: var(–muted) !important; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinning { animation: spin 1s linear infinite; display: inline-block; }
</style>

</head>
<body>

<header>
  <h1>NEARBY</h1>
  <span id="coord-label">— searching</span>
</header>

<div id="map-wrap">
  <div id="map"></div>
  <div id="status">📡 Getting your location…</div>
  <button id="locate-btn" title="Re-center">◎</button>
</div>

<div id="sheet">
  <div id="sheet-handle"></div>
  <div id="category-row">
    <button class="cat-btn active" data-cat="all">All</button>
    <button class="cat-btn" data-cat="food">🍽 Food</button>
    <button class="cat-btn" data-cat="cafe">☕ Café</button>
    <button class="cat-btn" data-cat="shop">🛍 Shop</button>
    <button class="cat-btn" data-cat="culture">🏛 Culture</button>
    <button class="cat-btn" data-cat="park">🌿 Park</button>
    <button class="cat-btn" data-cat="transit">🚇 Transit</button>
  </div>
  <div id="poi-list"><div class="empty">Waiting for location…</div></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

const OVERPASS = 'https://overpass-api.de/api/interpreter';

const CATEGORIES = {
  food:    { label: 'Food',    emoji: '🍽', tags: ['amenity=restaurant','amenity=fast_food','amenity=food_court'] },
  cafe:    { label: 'Café',    emoji: '☕', tags: ['amenity=cafe','amenity=bar','amenity=pub'] },
  shop:    { label: 'Shop',    emoji: '🛍', tags: ['shop=supermarket','shop=convenience','shop=clothes','shop=bakery','shop'] },
  culture: { label: 'Culture', emoji: '🏛', tags: ['amenity=museum','amenity=theatre','amenity=cinema','amenity=gallery','tourism=museum','tourism=gallery'] },
  park:    { label: 'Park',    emoji: '🌿', tags: ['leisure=park','leisure=garden','tourism=viewpoint'] },
  transit: { label: 'Transit', emoji: '🚇', tags: ['railway=station','highway=bus_stop','amenity=bus_station'] },
};

const CAT_EMOJI = {
  restaurant:'🍽',fast_food:'🍔',food_court:'🍱',cafe:'☕',bar:'🍺',pub:'🍺',
  supermarket:'🛒',convenience:'🏪',clothes:'👗',bakery:'🥐',
  museum:'🏛',theatre:'🎭',cinema:'🎬',gallery:'🖼',
  park:'🌿',garden:'🌸',viewpoint:'👁',
  station:'🚇',bus_stop:'🚌',bus_station:'🚌',
};

let map, userMarker, userLat, userLng;
let allPOIs = [];
let markers = [];
let activeCategory = 'all';
let sheetExpanded = false;

// Init map
map = L.map('map', { zoomControl: false, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// User marker
const userIcon = L.divIcon({
  html: `<div style="width:16px;height:16px;background:#c8f53d;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 4px rgba(200,245,61,0.3)"></div>`,
  className: '', iconSize: [16, 16], iconAnchor: [8, 8]
});

function poiIcon(emoji) {
  return L.divIcon({
    html: `<div style="background:#161616;border:1px solid #2a2a2a;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.5)">${emoji}</div>`,
    className: '', iconSize: [32, 32], iconAnchor: [16, 32]
  });
}

// Sheet toggle
document.getElementById('sheet-handle').addEventListener('click', () => {
  sheetExpanded = !sheetExpanded;
  document.getElementById('sheet').classList.toggle('expanded', sheetExpanded);
});

// Category filter
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    renderList();
    renderMarkers();
  });
});

// Locate button
document.getElementById('locate-btn').addEventListener('click', () => {
  if (userLat) map.setView([userLat, userLng], 16, { animate: true });
  else startLocation();
});

function setStatus(msg, hide = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.remove('hidden');
  if (hide) setTimeout(() => el.classList.add('hidden'), 2000);
}

function startLocation() {
  if (!navigator.geolocation) { setStatus('❌ Geolocation not supported'); return; }
  setStatus('📡 Getting your location…');
  navigator.geolocation.getCurrentPosition(onLocation, onLocError, {
    enableHighAccuracy: true, timeout: 12000, maximumAge: 30000
  });
}

function onLocation(pos) {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;

  document.getElementById('coord-label').textContent =
    `${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;

  map.setView([userLat, userLng], 16);

  if (userMarker) userMarker.remove();
  userMarker = L.marker([userLat, userLng], { icon: userIcon, zIndexOffset: 1000 })
    .addTo(map).bindPopup('You are here');

  setStatus('🔍 Loading nearby places…');
  fetchPOIs();
}

function onLocError(err) {
  setStatus('❌ ' + (err.code === 1 ? 'Location access denied' : 'Location unavailable'));
  // Demo: fall back to Berlin centre
  userLat = 52.5200; userLng = 13.4050;
  document.getElementById('coord-label').textContent = 'Berlin (demo)';
  map.setView([userLat, userLng], 15);
  if (userMarker) userMarker.remove();
  userMarker = L.marker([userLat, userLng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
  fetchPOIs();
}

async function fetchPOIs() {
  const r = 400; // metres radius
  const lat = userLat, lng = userLng;

  // Build one Overpass query for all categories
  const tagFilters = Object.values(CATEGORIES).flatMap(c =>
    c.tags.map(t => {
      const [k, v] = t.split('=');
      return v
        ? `node["${k}"="${v}"](around:${r},${lat},${lng});`
        : `node["${k}"](around:${r},${lat},${lng});`;
    })
  ).join('\n');

  const query = `[out:json][timeout:10];\n(\n${tagFilters}\n);\nout body;`;

  try {
    const res = await fetch(OVERPASS, {
      method: 'POST',
      body: 'data=' + encodeURIComponent(query)
    });
    const data = await res.json();
    processResults(data.elements || []);
  } catch (e) {
    setStatus('⚠ Could not load places', true);
    document.getElementById('poi-list').innerHTML = '<div class="empty">Failed to load. Check connection.</div>';
  }
}

function categorizePOI(tags) {
  const a = tags.amenity, s = tags.shop, l = tags.leisure, r = tags.railway, h = tags.highway, t = tags.tourism;
  if (['restaurant','fast_food','food_court'].includes(a)) return 'food';
  if (['cafe','bar','pub'].includes(a)) return 'cafe';
  if (s) return 'shop';
  if (['museum','theatre','cinema','gallery'].includes(a) || ['museum','gallery'].includes(t)) return 'culture';
  if (['park','garden'].includes(l) || t === 'viewpoint') return 'park';
  if (r === 'station' || h === 'bus_stop' || a === 'bus_station') return 'transit';
  return 'other';
}

function getEmoji(tags) {
  return CAT_EMOJI[tags.amenity] || CAT_EMOJI[tags.shop] || CAT_EMOJI[tags.leisure] ||
         CAT_EMOJI[tags.railway] || CAT_EMOJI[tags.highway] || '📍';
}

function dist(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function processResults(elements) {
  const seen = new Set();
  allPOIs = elements
    .filter(el => {
      const name = el.tags?.name;
      if (!name || seen.has(name + el.lat + el.lon)) return false;
      seen.add(name + el.lat + el.lon);
      return true;
    })
    .map(el => ({
      id: el.id,
      lat: el.lat, lng: el.lon,
      name: el.tags.name,
      tags: el.tags,
      cat: categorizePOI(el.tags),
      emoji: getEmoji(el.tags),
      dist: dist(userLat, userLng, el.lat, el.lon),
      type: el.tags.amenity || el.tags.shop || el.tags.leisure || el.tags.tourism || el.tags.railway || ''
    }))
    .sort((a, b) => a.dist - b.dist)
    .slice(0, 80);

  setStatus(`✓ ${allPOIs.length} places nearby`, true);
  renderList();
  renderMarkers();
}

function filteredPOIs() {
  if (activeCategory === 'all') return allPOIs;
  return allPOIs.filter(p => p.cat === activeCategory);
}

function renderList() {
  const list = document.getElementById('poi-list');
  const pois = filteredPOIs();
  if (!pois.length) {
    list.innerHTML = '<div class="empty">No places found in this category</div>';
    return;
  }
  list.innerHTML = pois.map(p => `
    <div class="poi-item" data-id="${p.id}">
      <div class="poi-icon">${p.emoji}</div>
      <div class="poi-info">
        <div class="poi-name">${p.name}</div>
        <div class="poi-meta">${p.type.replace(/_/g,' ')}</div>
      </div>
      <div class="poi-dist">${p.dist < 1000 ? p.dist + 'm' : (p.dist/1000).toFixed(1) + 'km'}</div>
    </div>
  `).join('');

  list.querySelectorAll('.poi-item').forEach(item => {
    item.addEventListener('click', () => {
      const poi = allPOIs.find(p => p.id == item.dataset.id);
      if (poi) {
        map.setView([poi.lat, poi.lng], 18, { animate: true });
        // Expand sheet collapse
        if (sheetExpanded) {
          sheetExpanded = false;
          document.getElementById('sheet').classList.remove('expanded');
        }
        // Open popup
        const m = markers.find(m => m._poiId == poi.id);
        if (m) m.openPopup();
      }
    });
  });
}

function renderMarkers() {
  markers.forEach(m => m.remove());
  markers = [];
  const pois = filteredPOIs();
  pois.forEach(p => {
    const m = L.marker([p.lat, p.lng], { icon: poiIcon(p.emoji) })
      .addTo(map)
      .bindPopup(`<strong>${p.name}</strong><br><span style="color:#666">${p.type.replace(/_/g,' ')} · ${p.dist}m</span>`);
    m._poiId = p.id;
    markers.push(m);
  });
}

startLocation();

}); // DOMContentLoaded
</script>

</body>
</html>
