<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vestaboard</title>
  <meta name="description" content="Submit and schedule messages to your local or remote Vestaboard">
  <meta name="theme-color" content="#D04A02">
  <link rel="manifest" href="./manifest.json">
  <link id="appkit-theme" rel="stylesheet" href="https://appkitcdn.pwc.com/appkit4/cdn/styles/4.10.3/themes/appkit.orange.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--color-background-default, #F3F3F3);
      color: var(--color-text-body, #474747);
      font-family: var(--font-family, 'PwC Helvetica Neue', Helvetica, Arial, sans-serif);
      font-size: 1rem;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1.25rem;
      height: 3.5rem;
      background: var(--color-background-primary, #D04A02);
      color: #fff;
    }
    .app-header svg { flex-shrink: 0; }
    .app-header-title {
      font-size: 1.25rem;
      font-weight: 500;
      flex: 1;
      cursor: default;
      user-select: none;
    }
    .app-header-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app-header-btn:hover { background: rgba(255,255,255,0.15); }

    /* ── Layout ───────────────────────────────────────────── */
    .app-main {
      max-width: 44rem;
      margin: 0 auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .card {
      background: var(--color-background-container, #fff);
      border: 1px solid var(--color-background-border, #D1D1D1);
      border-radius: 0.5rem;
      padding: 1.25rem;
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--color-text-heading, #252525);
      margin: 0 0 1rem;
    }

    /* ── Submit Form ──────────────────────────────────────── */
    .submit-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .submit-textarea {
      width: 100%;
      min-height: 6.5rem;
      padding: 0.75rem;
      border: 1px solid var(--color-background-border, #D1D1D1);
      border-radius: 0.25rem;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--color-text-body, #474747);
      background: var(--color-background-container, #fff);
      resize: vertical;
      transition: border-color 0.15s;
    }
    .submit-textarea:focus {
      outline: none;
      border-color: var(--color-background-primary, #D04A02);
    }
    .submit-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .char-counter {
      font-size: 0.875rem;
      color: var(--color-text-light, #696969);
    }
    .char-counter.over { color: var(--color-background-danger, #C52A1A); font-weight: 500; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 0.25rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary {
      background: var(--color-background-primary, #D04A02);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(0.9); }
    .btn-secondary {
      background: var(--color-background-container, #fff);
      color: var(--color-text-body, #474747);
      border: 1px solid var(--color-background-border, #D1D1D1);
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--color-background-hover, #F3F3F3);
    }
    .btn-danger {
      background: var(--color-background-danger, #C52A1A);
      color: #fff;
    }
    .btn-danger:hover:not(:disabled) { filter: brightness(0.9); }
    .btn-sm { padding: 0.25rem 0.625rem; font-size: 0.75rem; }
    .btn-icon {
      padding: 0.375rem;
      background: none;
      border: 1px solid transparent;
      border-radius: 0.25rem;
      color: var(--color-text-light, #696969);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-icon:hover {
      background: var(--color-background-hover, #F3F3F3);
      color: var(--color-text-body, #474747);
    }

    /* ── Board Preview ────────────────────────────────────── */
    .preview-board {
      display: grid;
      grid-template-columns: repeat(22, 1fr);
      gap: 2px;
      background: #1a1a1a;
      border-radius: 0.5rem;
      padding: 0.5rem;
      aspect-ratio: 22 / 6.6;
    }
    .preview-tile {
      aspect-ratio: 1;
      background: #2d2d2d;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.45rem, 1.8vw, 0.85rem);
      font-weight: 700;
      color: #1a1a1a;
      text-transform: uppercase;
      transition: background 0.15s;
    }
    .preview-tile.filled { background: #D04A02; color: #fff; }
    .preview-tile.space  { background: #2d2d2d; }

    /* ── Queue ────────────────────────────────────────────── */
    .queue-empty {
      text-align: center;
      padding: 1.5rem 0;
      color: var(--color-text-light, #696969);
      font-size: 0.875rem;
    }
    .queue-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .queue-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--color-background-container, #fff);
      border: 1px solid var(--color-background-border, #D1D1D1);
      border-radius: 0.25rem;
      transition: background 0.2s, opacity 0.5s;
    }
    .queue-item.sending {
      border-left: 3px solid var(--color-background-primary, #D04A02);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .queue-item.sent {
      border-left: 3px solid var(--color-background-success, #21812D);
      opacity: 0.6;
    }
    .queue-item.error {
      border-left: 3px solid var(--color-background-danger, #C52A1A);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .queue-item-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.875rem;
    }
    .queue-item-status {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.125rem 0.5rem;
      border-radius: 1rem;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .status-pending  { background: var(--color-background-hover, #F3F3F3); color: var(--color-text-light, #696969); }
    .status-sending  { background: #FEF0E6; color: #D04A02; }
    .status-sent     { background: #E6F4E8; color: #21812D; }
    .status-error    { background: #FCEAE8; color: #C52A1A; }
    .queue-item-actions {
      display: flex;
      align-items: center;
      gap: 0.125rem;
      flex-shrink: 0;
    }

    /* ── Settings Dialog ──────────────────────────────────── */
    dialog {
      border: none;
      border-radius: 0.5rem;
      padding: 0;
      max-width: 28rem;
      width: calc(100% - 2.5rem);
      box-shadow: 0 0.5rem 1rem -0.125rem rgba(71,71,71,0.24);
      background: var(--color-background-container, #fff);
      color: var(--color-text-body, #474747);
    }
    dialog::backdrop {
      background: rgba(45,45,45,0.32);
      backdrop-filter: blur(2px);
    }
    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.25rem 0;
    }
    .dialog-header h2 {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--color-text-heading, #252525);
      margin: 0;
    }
    .dialog-header .btn-icon {
      color: var(--color-text-body, #474747);
    }
    .dialog-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    .dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      padding: 0 1.25rem 1.25rem;
    }
    .field-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .field-group label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text-heading, #252525);
    }
    .field-group input {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--color-background-border, #D1D1D1);
      border-radius: 0.25rem;
      font-family: inherit;
      font-size: 0.875rem;
      color: var(--color-text-body, #474747);
      background: var(--color-background-alt, #fff);
      transition: border-color 0.15s;
    }
    .field-group input:focus {
      outline: none;
      border-color: var(--color-background-primary, #D04A02);
    }
    .radio-group {
      display: flex;
      gap: 1.25rem;
      padding: 0.25rem 0;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--color-text-body, #474747);
    }
    .radio-group input[type="radio"] {
      accent-color: var(--color-background-primary, #D04A02);
      width: 1rem;
      height: 1rem;
    }
    .api-fields { display: flex; flex-direction: column; gap: 0.75rem; }
    .test-result {
      font-size: 0.8125rem;
      padding: 0.5rem 0.75rem;
      border-radius: 0.25rem;
      display: none;
    }
    .test-result.success {
      display: block;
      background: #E6F4E8;
      color: #21812D;
    }
    .test-result.error {
      display: block;
      background: #FCEAE8;
      color: #C52A1A;
    }

    /* ── Toast ────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      top: 4.25rem;
      right: 1.25rem;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      padding: 0.75rem 1rem;
      border-radius: 0.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: 0 0.25rem 0.5rem -0.125rem rgba(71,71,71,0.24);
      animation: toastIn 0.3s ease-out;
      max-width: 22rem;
    }
    .toast.success { background: #21812D; color: #fff; }
    .toast.error   { background: #C52A1A; color: #fff; }
    .toast.info    { background: var(--color-background-primary, #D04A02); color: #fff; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-0.5rem); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Alignment Toolbar ─────────────────────────────────── */
    .align-toolbar {
      display: flex;
      gap: 0.25rem;
    }
    .align-btn {
      padding: 0.375rem;
      background: none;
      border: 1px solid var(--color-background-border, #D1D1D1);
      border-radius: 0.25rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-light, #696969);
      transition: background 0.15s, border-color 0.15s;
    }
    .align-btn:hover {
      background: var(--color-background-hover, #F3F3F3);
      color: var(--color-text-body, #474747);
    }
    .align-btn.active {
      background: var(--color-background-primary, #D04A02);
      border-color: var(--color-background-primary, #D04A02);
      color: #fff;
    }

    /* ── Schedule Row ─────────────────────────────────────── */
    .schedule-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .schedule-row label {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.875rem;
      color: var(--color-text-body, #474747);
      cursor: pointer;
      white-space: nowrap;
    }
    .schedule-row input[type="checkbox"] {
      accent-color: var(--color-background-primary, #D04A02);
      width: 1rem;
      height: 1rem;
    }
    .schedule-row input[type="datetime-local"] {
      padding: 0.375rem 0.5rem;
      border: 1px solid var(--color-background-border, #D1D1D1);
      border-radius: 0.25rem;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--color-text-body, #474747);
      background: var(--color-background-container, #fff);
    }
    .schedule-row input[type="datetime-local"]:focus {
      outline: none;
      border-color: var(--color-background-primary, #D04A02);
    }
    .schedule-row input[type="datetime-local"]:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .queue-item-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .queue-item-schedule {
      font-size: 0.6875rem;
      color: var(--color-text-light, #696969);
      white-space: nowrap;
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 599px) {
      .app-main { padding: 0.75rem; gap: 0.75rem; }
      .card { padding: 0.75rem; }
      .preview-board { gap: 1px; padding: 0.25rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <svg width="32" height="20" viewBox="0 0 32 20" fill="none" aria-label="logo">
      <text x="0" y="16" font-family="Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="#fff"></text>
    </svg>
    <span class="app-header-title" id="header-title">Vestaboard Submitter</span>
    <button class="app-header-btn" id="btn-theme" aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg id="icon-theme" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="10" cy="10" r="4"/>
        <path d="M10 2v2M10 16v2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M2 10h2M16 10h2M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4"/>
      </svg>
    </button>
  </header>

  <!-- Main Content -->
  <main class="app-main">

    <!-- Submit Form -->
    <section class="card">
      <h2 class="card-title">New Message</h2>
      <div class="submit-group">
        <textarea id="msg-input" class="submit-textarea" placeholder="Type your message (6 rows x 22 characters)..." maxlength="200" rows="4"></textarea>
        <div class="submit-footer">
          <span id="char-counter" class="char-counter">0 / 132</span>
          <div class="align-toolbar">
            <button class="align-btn" data-align="left" title="Align left" aria-label="Align left">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 3h12M2 6.5h8M2 10h10M2 13.5h6"/></svg>
            </button>
            <button class="align-btn active" data-align="center-all" title="Center horizontally and vertically" aria-label="Center text horizontally and vertically">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 5h8M3 7.5h10M3 10.5h10M5 13h6"/><rect x="1" y="1" width="14" height="14" rx="1" fill="none"/></svg>
            </button>
            <button class="align-btn" data-align="right" title="Align right" aria-label="Align right">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 3h12M8 6.5h6M4 10h10M8 13.5h6"/></svg>
            </button>
          </div>
          <button id="btn-submit" class="btn btn-primary" disabled>Add to Queue</button>
        </div>
        <div class="schedule-row">
          <label><input type="checkbox" id="schedule-toggle"> Schedule send</label>
          <input type="datetime-local" id="schedule-time" disabled>
        </div>
      </div>
    </section>

    <!-- Board Preview -->
    <section class="card">
      <h2 class="card-title">Board Preview</h2>
      <div id="preview-board" class="preview-board" aria-label="Vestaboard preview"></div>
    </section>

    <!-- Message Queue -->
    <section class="card">
      <h2 class="card-title">Message Queue</h2>
      <div id="queue-container">
        <div class="queue-empty">No messages in the queue.</div>
      </div>
    </section>

  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Settings Dialog -->
  <dialog id="settings-dialog">
    <div class="dialog-header">
      <h2>Settings</h2>
      <button class="btn-icon" id="btn-dialog-close" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/>
        </svg>
      </button>
    </div>
    <div class="dialog-body">
      <div class="field-group">
        <label>Connection Method</label>
        <div class="radio-group">
          <label><input type="radio" name="api-method" value="local" checked> Local API</label>
          <label><input type="radio" name="api-method" value="rw"> Read/Write API</label>
        </div>
      </div>

      <div id="local-fields" class="api-fields">
        <div class="field-group">
          <label for="cfg-ip">Board IP Address</label>
          <input id="cfg-ip" type="text" placeholder="e.g. 192.168.1.100">
        </div>
        <div class="field-group">
          <label for="cfg-local-key">Local API Enablement Token</label>
          <input id="cfg-local-key" type="password" placeholder="Enter token">
        </div>
      </div>

      <div id="rw-fields" class="api-fields" style="display:none">
        <div class="field-group">
          <label for="cfg-rw-key">Read/Write API Key</label>
          <input id="cfg-rw-key" type="password" placeholder="Enter API key">
        </div>
      </div>

      <button id="btn-test" class="btn btn-secondary btn-sm">Test Connection</button>
      <div id="test-result" class="test-result"></div>
    </div>
    <div class="dialog-footer">
      <button id="btn-cfg-cancel" class="btn btn-secondary">Cancel</button>
      <button id="btn-cfg-save" class="btn btn-primary">Save</button>
    </div>
  </dialog>

  <script>
    (function () {
      'use strict';

      /* ═══════════════════════════════════════════════════════
         Vestaboard character map
         ═══════════════════════════════════════════════════════ */
      const CHAR_MAP = {
        ' ':0,'A':1,'B':2,'C':3,'D':4,'E':5,'F':6,'G':7,'H':8,'I':9,'J':10,
        'K':11,'L':12,'M':13,'N':14,'O':15,'P':16,'Q':17,'R':18,'S':19,'T':20,
        'U':21,'V':22,'W':23,'X':24,'Y':25,'Z':26,'1':27,'2':28,'3':29,'4':30,
        '5':31,'6':32,'7':33,'8':34,'9':35,'0':36,'!':37,'@':38,'#':39,'$':40,
        '(':41,')':42,'-':44,'+':46,'&':47,
        '=':48,';':49,':':50,'\'':52,'"':53,'%':54,',':55,'.':56,'/':59,
        '?':60,'°':62
      };
      const CODE_TO_CHAR = {};
      for (const [ch, code] of Object.entries(CHAR_MAP)) CODE_TO_CHAR[code] = ch;

      const ROWS = 6;
      const COLS = 22;
      const MAX_CHARS = ROWS * COLS;
      const SEND_INTERVAL_MS = 15000;
      const SENT_DISPLAY_MS = 1500;
      const STORAGE_CONFIG = 'vestaboard-config';
      const STORAGE_QUEUE = 'vestaboard-queue';

      /* ═══════════════════════════════════════════════════════
         DOM refs
         ═══════════════════════════════════════════════════════ */
      const msgInput = document.getElementById('msg-input');
      const charCounter = document.getElementById('char-counter');
      const btnSubmit = document.getElementById('btn-submit');
      const previewBoard = document.getElementById('preview-board');
      const queueContainer = document.getElementById('queue-container');
      const toastContainer = document.getElementById('toast-container');
      const settingsDialog = document.getElementById('settings-dialog');
      const headerTitle = document.getElementById('header-title');
      const btnDialogClose = document.getElementById('btn-dialog-close');
      const btnTest = document.getElementById('btn-test');
      const btnCfgSave = document.getElementById('btn-cfg-save');
      const btnCfgCancel = document.getElementById('btn-cfg-cancel');
      const testResult = document.getElementById('test-result');
      const localFields = document.getElementById('local-fields');
      const rwFields = document.getElementById('rw-fields');

      const btnTheme = document.getElementById('btn-theme');
      const iconTheme = document.getElementById('icon-theme');
      const themeLink = document.getElementById('appkit-theme');
      const scheduleToggle = document.getElementById('schedule-toggle');
      const scheduleTime = document.getElementById('schedule-time');
      const alignBtns = document.querySelectorAll('.align-btn');

      /* ═══════════════════════════════════════════════════════
         State
         ═══════════════════════════════════════════════════════ */
      let queue = loadQueue();
      let config = loadConfig();
      let sending = false;
      let sendTimer = null;
      let currentAlign = 'center-all';
      let darkMode = localStorage.getItem('vestaboard-dark') === 'true';

      /* ═══════════════════════════════════════════════════════
         Persistence helpers
         ═══════════════════════════════════════════════════════ */
      function loadConfig() {
        try { return JSON.parse(localStorage.getItem(STORAGE_CONFIG)) || null; }
        catch { return null; }
      }
      function saveConfig(cfg) {
        config = cfg;
        localStorage.setItem(STORAGE_CONFIG, JSON.stringify(cfg));
      }
      function loadQueue() {
        try { return JSON.parse(localStorage.getItem(STORAGE_QUEUE)) || []; }
        catch { return []; }
      }
      function persistQueue() {
        localStorage.setItem(STORAGE_QUEUE, JSON.stringify(queue));
      }

      /* ═══════════════════════════════════════════════════════
         Word-wrap text into lines of COLS width
         ═══════════════════════════════════════════════════════ */
      function wrapText(text) {
        const result = [];
        const paragraphs = text.split('\n');
        for (const para of paragraphs) {
          if (para.length === 0) { result.push(''); continue; }
          const words = para.split(' ');
          let line = '';
          for (const word of words) {
            if (word.length > COLS) {
              if (line) { result.push(line); line = ''; }
              for (let i = 0; i < word.length; i += COLS) {
                result.push(word.slice(i, i + COLS));
              }
              continue;
            }
            if (line.length === 0) {
              line = word;
            } else if (line.length + 1 + word.length <= COLS) {
              line += ' ' + word;
            } else {
              result.push(line);
              line = word;
            }
          }
          if (line) result.push(line);
        }
        return result.slice(0, ROWS);
      }

      /* ═══════════════════════════════════════════════════════
         Text → 6×22 grid (with alignment)
         ═══════════════════════════════════════════════════════ */
      function alignLine(line, align) {
        if (line.length >= COLS) return line.slice(0, COLS);
        const pad = COLS - line.length;
        if (align === 'center') {
          const left = Math.floor(pad / 2);
          return ' '.repeat(left) + line + ' '.repeat(pad - left);
        }
        if (align === 'right') {
          return ' '.repeat(pad) + line;
        }
        return line + ' '.repeat(pad);
      }

      function textToGrid(text, align) {
        const grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        const lines = wrapText(text.toUpperCase());
        const hAlign = align === 'right' ? 'right' : (align === 'center' || align === 'center-all') ? 'center' : 'left';
        const vOffset = align === 'center-all' ? Math.floor((ROWS - lines.length) / 2) : 0;
        for (let i = 0; i < lines.length && (i + vOffset) < ROWS; i++) {
          const r = i + vOffset;
          const aligned = alignLine(lines[i], hAlign);
          for (let c = 0; c < COLS; c++) {
            const ch = aligned[c] || ' ';
            grid[r][c] = CHAR_MAP[ch] !== undefined ? CHAR_MAP[ch] : 0;
          }
        }
        return grid;
      }

      /* ═══════════════════════════════════════════════════════
         Board Preview
         ═══════════════════════════════════════════════════════ */
      function initPreview() {
        previewBoard.innerHTML = '';
        for (let i = 0; i < ROWS * COLS; i++) {
          const tile = document.createElement('div');
          tile.className = 'preview-tile';
          previewBoard.appendChild(tile);
        }
      }

      function updatePreview(text) {
        const grid = textToGrid(text || '', currentAlign);
        const tiles = previewBoard.children;
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const tile = tiles[r * COLS + c];
            const code = grid[r][c];
            const ch = CODE_TO_CHAR[code] || '';
            tile.textContent = ch === ' ' ? '' : ch;
            tile.className = 'preview-tile' + (code !== 0 ? ' filled' : '');
          }
        }
      }

      /* ═══════════════════════════════════════════════════════
         Character counter
         ═══════════════════════════════════════════════════════ */
      function updateCharCounter() {
        const text = msgInput.value;
        const lines = wrapText(text.toUpperCase());
        let count = 0;
        for (const line of lines) count += Math.min(line.length, COLS);
        const overflow = wrapText(text).length > ROWS;
        charCounter.textContent = count + ' / ' + MAX_CHARS + (overflow ? ' (text truncated)' : '');
        charCounter.classList.toggle('over', overflow);
        btnSubmit.disabled = text.trim().length === 0;
      }

      /* ═══════════════════════════════════════════════════════
         Queue operations
         ═══════════════════════════════════════════════════════ */
      function addToQueue(text, align, scheduledAt) {
        queue.push({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          text: text.trim(),
          align: align || 'center-all',
          status: 'pending',
          timestamp: Date.now(),
          scheduledAt: scheduledAt || null
        });
        persistQueue();
        renderQueue();
        scheduleSend();
      }

      function removeFromQueue(id) {
        queue = queue.filter(m => m.id !== id);
        persistQueue();
        renderQueue();
      }

      function moveInQueue(id, direction) {
        const idx = queue.findIndex(m => m.id === id);
        if (idx < 0) return;
        const targetIdx = idx + direction;
        if (targetIdx < 0 || targetIdx >= queue.length) return;
        if (queue[idx].status === 'sending' || queue[targetIdx].status === 'sending') return;
        [queue[idx], queue[targetIdx]] = [queue[targetIdx], queue[idx]];
        persistQueue();
        renderQueue();
      }

      function retryItem(id) {
        const item = queue.find(m => m.id === id);
        if (item) {
          item.status = 'pending';
          persistQueue();
          renderQueue();
          scheduleSend();
        }
      }

      /* ═══════════════════════════════════════════════════════
         Render Queue
         ═══════════════════════════════════════════════════════ */
      function formatSchedule(ts) {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }

      function renderQueue() {
        if (queue.length === 0) {
          queueContainer.innerHTML = '<div class="queue-empty">No messages in the queue.</div>';
          return;
        }
        let html = '<div class="queue-list">';
        queue.forEach((item, i) => {
          const statusClass = 'status-' + item.status;
          const alignLabel = item.align === 'center-all' ? 'C' : item.align === 'right' ? 'R' : 'L';
          html += '<div class="queue-item ' + item.status + '" data-id="' + item.id + '">';
          html += '<span class="queue-item-text" title="' + escapeAttr(item.text) + '">' + escapeHtml(item.text) + '</span>';
          html += '<span class="queue-item-meta">';
          if (item.scheduledAt) {
            const isWaiting = item.status === 'pending' && item.scheduledAt > Date.now();
            html += '<span class="queue-item-schedule">' + (isWaiting ? '&#x1f552; ' : '') + formatSchedule(item.scheduledAt) + '</span>';
          }
          html += '<span class="queue-item-status ' + statusClass + '">' + alignLabel + ' &middot; ' + item.status + '</span>';
          html += '</span>';
          html += '<span class="queue-item-actions">';
          if (item.status === 'error') {
            html += '<button class="btn btn-sm btn-primary" data-action="retry" data-id="' + item.id + '">Retry</button>';
          }
          if (item.status !== 'sending' && item.status !== 'sent') {
            html += '<button class="btn-icon" data-action="up" data-id="' + item.id + '" title="Move up"' + (i === 0 ? ' disabled' : '') + '>';
            html += '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 11V3M3.5 6.5 7 3l3.5 3.5"/></svg></button>';
            html += '<button class="btn-icon" data-action="down" data-id="' + item.id + '" title="Move down"' + (i === queue.length - 1 ? ' disabled' : '') + '>';
            html += '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 3v8M3.5 7.5 7 11l3.5-3.5"/></svg></button>';
            html += '<button class="btn-icon" data-action="remove" data-id="' + item.id + '" title="Remove">';
            html += '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg></button>';
          }
          html += '</span></div>';
        });
        html += '</div>';
        queueContainer.innerHTML = html;
      }

      /* ═══════════════════════════════════════════════════════
         Queue event delegation
         ═══════════════════════════════════════════════════════ */
      queueContainer.addEventListener('click', function (e) {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        if (action === 'up') moveInQueue(id, -1);
        else if (action === 'down') moveInQueue(id, 1);
        else if (action === 'remove') removeFromQueue(id);
        else if (action === 'retry') retryItem(id);
      });

      /* ═══════════════════════════════════════════════════════
         Vestaboard API
         ═══════════════════════════════════════════════════════ */
      function applyAlignment(text, align) {
        let lines = wrapText(text.toUpperCase());
        if (align === 'left' || !align) return lines.join('\n');
        const hAlign = align === 'right' ? 'right' : (align === 'center' || align === 'center-all') ? 'center' : 'left';
        lines = lines.map(line => alignLine(line, hAlign).trimEnd());
        if (align === 'center-all') {
          const vPad = Math.floor((ROWS - lines.length) / 2);
          const emptyLines = Array(vPad).fill('');
          lines = [...emptyLines, ...lines];
        }
        return lines.join('\n');
      }

      async function sendToVestaboard(text, align) {
        if (!config) throw new Error('No connection configured. Open Settings first.');

        const alignedText = applyAlignment(text, align);
        const body = JSON.stringify({ text: alignedText });
        let url, headers;

        if (config.method === 'local') {
          url = 'http://' + config.ip + ':7000/local-api/message';
          headers = {
            'Content-Type': 'application/json',
            'X-Vestaboard-Local-Api-Key': config.localKey
          };
        } else {
          url = 'https://rw.vestaboard.com/';
          headers = {
            'Content-Type': 'application/json',
            'X-Vestaboard-Read-Write-Key': config.rwKey
          };
        }

        const resp = await fetch(url, { method: 'POST', headers, body });
        if (!resp.ok) {
          const errText = await resp.text().catch(() => '');
          throw new Error('HTTP ' + resp.status + (errText ? ': ' + errText : ''));
        }
        return resp.json().catch(() => ({}));
      }

      /* ═══════════════════════════════════════════════════════
         Auto-send loop
         ═══════════════════════════════════════════════════════ */
      function scheduleSend() {
        if (sendTimer) return;
        processQueue();
      }

      async function processQueue() {
        if (sending) return;

        const now = Date.now();
        const next = queue.find(m => m.status === 'pending' && (!m.scheduledAt || m.scheduledAt <= now));
        if (!next) {
          const futureItem = queue.find(m => m.status === 'pending' && m.scheduledAt && m.scheduledAt > now);
          if (futureItem) {
            const delay = Math.min(futureItem.scheduledAt - now + 500, 60000);
            sendTimer = setTimeout(processQueue, delay);
          } else {
            sendTimer = null;
          }
          return;
        }

        if (!config) {
          showToast('Open Settings to configure your Vestaboard connection.', 'info');
          sendTimer = null;
          return;
        }

        sending = true;
        next.status = 'sending';
        persistQueue();
        renderQueue();

        try {
          await sendToVestaboard(next.text, next.align);
          next.status = 'sent';
          persistQueue();
          renderQueue();
          showToast('Message sent!', 'success');

          setTimeout(() => {
            removeFromQueue(next.id);
          }, SENT_DISPLAY_MS);
        } catch (err) {
          next.status = 'error';
          persistQueue();
          renderQueue();
          showToast('Send failed: ' + err.message, 'error');
        }

        sending = false;
        sendTimer = setTimeout(processQueue, SEND_INTERVAL_MS);
      }

      /* ═══════════════════════════════════════════════════════
         Toast notifications
         ═══════════════════════════════════════════════════════ */
      function showToast(message, type) {
        const el = document.createElement('div');
        el.className = 'toast ' + (type || 'info');
        el.textContent = message;
        toastContainer.appendChild(el);
        setTimeout(() => {
          el.style.opacity = '0';
          el.style.transition = 'opacity 0.3s';
          setTimeout(() => el.remove(), 300);
        }, 3500);
      }

      /* ═══════════════════════════════════════════════════════
         Settings Dialog
         ═══════════════════════════════════════════════════════ */
      function openSettings() {
        const radios = document.querySelectorAll('input[name="api-method"]');
        if (config) {
          radios.forEach(r => { r.checked = r.value === config.method; });
          document.getElementById('cfg-ip').value = config.ip || '';
          document.getElementById('cfg-local-key').value = config.localKey || '';
          document.getElementById('cfg-rw-key').value = config.rwKey || '';
        } else {
          radios[0].checked = true;
          document.getElementById('cfg-ip').value = '';
          document.getElementById('cfg-local-key').value = '';
          document.getElementById('cfg-rw-key').value = '';
        }
        toggleApiFields();
        testResult.className = 'test-result';
        testResult.textContent = '';
        settingsDialog.showModal();
      }

      function closeSettings() {
        settingsDialog.close();
      }

      function toggleApiFields() {
        const method = document.querySelector('input[name="api-method"]:checked').value;
        localFields.style.display = method === 'local' ? '' : 'none';
        rwFields.style.display = method === 'rw' ? '' : 'none';
      }

      async function testConnection() {
        const method = document.querySelector('input[name="api-method"]:checked').value;
        const tmpConfig = buildConfigFromForm(method);
        testResult.className = 'test-result';
        testResult.textContent = 'Testing...';
        testResult.style.display = 'block';

        try {
          let url, headers;
          if (method === 'local') {
            url = 'http://' + tmpConfig.ip + ':7000/local-api/message';
            headers = {
              'X-Vestaboard-Local-Api-Key': tmpConfig.localKey
            };
          } else {
            url = 'https://rw.vestaboard.com/';
            headers = {
              'X-Vestaboard-Read-Write-Key': tmpConfig.rwKey
            };
          }
          const resp = await fetch(url, { method: 'GET', headers });
          if (resp.ok || resp.status === 304 || resp.status === 405) {
            testResult.className = 'test-result success';
            testResult.textContent = 'Connection successful!';
          } else {
            throw new Error('HTTP ' + resp.status);
          }
        } catch (err) {
          testResult.className = 'test-result error';
          testResult.textContent = 'Connection failed: ' + err.message;
        }
      }

      function buildConfigFromForm(method) {
        return {
          method,
          ip: document.getElementById('cfg-ip').value.trim(),
          localKey: document.getElementById('cfg-local-key').value.trim(),
          rwKey: document.getElementById('cfg-rw-key').value.trim()
        };
      }

      function saveSettings() {
        const method = document.querySelector('input[name="api-method"]:checked').value;
        const cfg = buildConfigFromForm(method);

        if (method === 'local' && (!cfg.ip || !cfg.localKey)) {
          showToast('Please fill in IP address and token.', 'error');
          return;
        }
        if (method === 'rw' && !cfg.rwKey) {
          showToast('Please fill in the API key.', 'error');
          return;
        }

        saveConfig(cfg);
        closeSettings();
        showToast('Settings saved.', 'success');
        scheduleSend();
      }

      /* ═══════════════════════════════════════════════════════
         Dark Mode
         ═══════════════════════════════════════════════════════ */
      const THEME_LIGHT = 'https://appkitcdn.pwc.com/appkit4/cdn/styles/4.10.3/themes/appkit.orange.min.css';
      const THEME_DARK = 'https://appkitcdn.pwc.com/appkit4/cdn/styles/4.10.3/themes/appkit.orange.dark.min.css';
      const SUN_SVG = '<circle cx="10" cy="10" r="4"/><path d="M10 2v2M10 16v2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M2 10h2M16 10h2M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4"/>';
      const MOON_SVG = '<path d="M17 10a7 7 0 1 1-7.5-7 5.5 5.5 0 0 0 7.5 7Z"/>';

      function applyTheme() {
        themeLink.href = darkMode ? THEME_DARK : THEME_LIGHT;
        iconTheme.innerHTML = darkMode ? MOON_SVG : SUN_SVG;
        localStorage.setItem('vestaboard-dark', darkMode);
      }

      btnTheme.addEventListener('click', function () {
        darkMode = !darkMode;
        applyTheme();
      });

      /* ═══════════════════════════════════════════════════════
         Alignment
         ═══════════════════════════════════════════════════════ */
      alignBtns.forEach(btn => {
        btn.addEventListener('click', function () {
          alignBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentAlign = btn.dataset.align;
          updatePreview(msgInput.value);
        });
      });

      /* ═══════════════════════════════════════════════════════
         Schedule Toggle
         ═══════════════════════════════════════════════════════ */
      scheduleToggle.addEventListener('change', function () {
        scheduleTime.disabled = !scheduleToggle.checked;
        if (scheduleToggle.checked && !scheduleTime.value) {
          const now = new Date();
          now.setMinutes(now.getMinutes() + 30);
          scheduleTime.value = now.toISOString().slice(0, 16);
        }
      });

      /* ═══════════════════════════════════════════════════════
         Event Bindings
         ═══════════════════════════════════════════════════════ */
      msgInput.addEventListener('input', function () {
        updateCharCounter();
        updatePreview(msgInput.value);
      });

      btnSubmit.addEventListener('click', function () {
        const text = msgInput.value.trim();
        if (!text) return;
        let scheduledAt = null;
        if (scheduleToggle.checked && scheduleTime.value) {
          scheduledAt = new Date(scheduleTime.value).getTime();
          if (scheduledAt <= Date.now()) {
            showToast('Scheduled time must be in the future.', 'error');
            return;
          }
        }
        addToQueue(text, currentAlign, scheduledAt);
        msgInput.value = '';
        scheduleToggle.checked = false;
        scheduleTime.value = '';
        scheduleTime.disabled = true;
        updateCharCounter();
        updatePreview('');
        showToast(scheduledAt ? 'Message scheduled.' : 'Message added to queue.', 'info');
      });

      headerTitle.addEventListener('dblclick', openSettings);
      btnDialogClose.addEventListener('click', closeSettings);
      btnCfgCancel.addEventListener('click', closeSettings);
      btnCfgSave.addEventListener('click', saveSettings);
      btnTest.addEventListener('click', testConnection);

      document.querySelectorAll('input[name="api-method"]').forEach(r => {
        r.addEventListener('change', toggleApiFields);
      });

      msgInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          btnSubmit.click();
        }
      });

      /* ═══════════════════════════════════════════════════════
         Utilities
         ═══════════════════════════════════════════════════════ */
      function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      function escapeAttr(s) {
        return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      /* ═══════════════════════════════════════════════════════
         Init
         ═══════════════════════════════════════════════════════ */
      applyTheme();
      initPreview();
      updatePreview('');
      updateCharCounter();
      renderQueue();

      if (!config) {
        setTimeout(openSettings, 400);
      } else {
        scheduleSend();
      }

      /* ═══════════════════════════════════════════════════════
         Service Worker Registration
         ═══════════════════════════════════════════════════════ */
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    })();
  </script>
</body>
</html>
