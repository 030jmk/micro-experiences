<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="description" content="Floating network as screensaver. Trippe click to open settings.">
    <link rel="manifest" href="manifest.json">
    <title>Floating Network</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            overflow: hidden;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .content h1 {
            font-family: 'Georgia', serif;
            font-size: 4em;
            color: #000000;
        }

        .content p {
            font-family: 'Arial', sans-serif;
            font-size: 2rem;
            color: #000000;
        }

        /* Settings Modal */
        .settings-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .settings-backdrop.open {
            display: flex;
        }

        .settings-modal {
            background: #1a1a1a;
            color: #e0e0e0;
            border-radius: 12px;
            padding: 28px 32px;
            width: 90vw;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
        }

        .settings-modal::-webkit-scrollbar {
            width: 6px;
        }

        .settings-modal::-webkit-scrollbar-track {
            background: transparent;
        }

        .settings-modal::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #333;
        }

        .settings-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }

        .settings-close {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            line-height: 1;
        }

        .settings-close:hover {
            color: #fff;
            background: #333;
        }

        .settings-section {
            margin-bottom: 20px;
        }

        .settings-section h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
            margin-bottom: 12px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 12px;
        }

        .setting-row label {
            font-size: 0.85rem;
            color: #ccc;
            white-space: nowrap;
            min-width: 100px;
        }

        .setting-row .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: flex-end;
        }

        .setting-row input[type="range"] {
            flex: 1;
            max-width: 180px;
            accent-color: #666;
            height: 4px;
        }

        .setting-row input[type="color"] {
            width: 32px;
            height: 28px;
            border: 1px solid #444;
            border-radius: 4px;
            background: none;
            cursor: pointer;
            padding: 0;
        }

        .setting-row input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 2px;
        }

        .setting-row input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 2px;
        }

        .setting-row input[type="text"] {
            flex: 1;
            max-width: 220px;
            background: #222;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .setting-row input[type="text"]:focus {
            outline: none;
            border-color: #666;
        }

        .setting-row select {
            background: #222;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .setting-row select:focus {
            outline: none;
            border-color: #666;
        }

        .range-value {
            font-size: 0.75rem;
            color: #888;
            min-width: 36px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .gradient-stops {
            margin-top: 8px;
            padding-left: 4px;
        }

        .gradient-stop-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .gradient-stop-row label {
            font-size: 0.8rem;
            color: #999;
            min-width: 50px;
        }

        .gradient-stop-row input[type="color"] {
            width: 28px;
            height: 24px;
            border: 1px solid #444;
            border-radius: 4px;
            background: none;
            cursor: pointer;
            padding: 0;
        }

        .gradient-stop-row input[type="text"] {
            width: 80px;
            background: #222;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .gradient-stop-row input[type="text"]:focus {
            outline: none;
            border-color: #666;
        }

        .share-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .share-url {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .copy-btn {
            background: #333;
            border: 1px solid #444;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #444;
            color: #fff;
        }

        @media (max-width: 480px) {
            .settings-modal {
                padding: 20px 16px;
                width: 95vw;
            }

            .setting-row {
                flex-wrap: wrap;
                gap: 6px;
            }

            .setting-row .controls {
                width: 100%;
                justify-content: flex-start;
            }

            .setting-row input[type="range"] {
                max-width: none;
            }

            .setting-row input[type="text"] {
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="content">
        <h1></h1>
        <p></p>
    </div>

    <div class="settings-backdrop" id="settingsBackdrop">
        <div class="settings-modal" id="settingsModal">
            <div class="settings-header">
                <h2>Settings</h2>
                <button class="settings-close" id="settingsClose">&times;</button>
            </div>

            <div class="settings-section">
                <h3>Background</h3>
                <div class="setting-row">
                    <label>Type</label>
                    <div class="controls">
                        <select id="bgType">
                            <option value="solid">Solid</option>
                            <option value="gradient">Gradient</option>
                        </select>
                    </div>
                </div>
                <div class="setting-row" id="bgColorRow">
                    <label>Color</label>
                    <div class="controls">
                        <input type="color" id="bgColor" value="#000000">
                    </div>
                </div>
                <div id="gradientSection" style="display:none;">
                    <div class="setting-row">
                        <label>Direction</label>
                        <div class="controls">
                            <select id="bgGradientDir">
                                <option value="to right">Left to Right</option>
                                <option value="to bottom">Top to Bottom</option>
                                <option value="to bottom right">Diagonal</option>
                                <option value="circle">Radial</option>
                            </select>
                        </div>
                    </div>
                    <div class="gradient-stops">
                        <div class="gradient-stop-row">
                            <label>Start</label>
                            <input type="color" id="gradColor1" value="#000000">
                        </div>
                        <div class="gradient-stop-row">
                            <label>Middle</label>
                            <input type="color" id="gradColor2" value="#333333">
                        </div>
                        <div class="gradient-stop-row">
                            <label>End</label>
                            <input type="color" id="gradColor3" value="#000000">
                        </div>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h3>Nodes</h3>
                <div class="setting-row">
                    <label>Count</label>
                    <div class="controls">
                        <input type="range" id="nodeCount" min="10" max="500" value="200" step="1">
                        <span class="range-value" id="nodeCountVal">200</span>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Speed</label>
                    <div class="controls">
                        <input type="range" id="speed" min="0.1" max="3" value="0.5" step="0.1">
                        <span class="range-value" id="speedVal">0.5</span>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Color</label>
                    <div class="controls">
                        <input type="color" id="nodeColor" value="#ffffff">
                    </div>
                </div>
                <div class="setting-row">
                    <label>Max Distance</label>
                    <div class="controls">
                        <input type="range" id="maxDistance" min="50" max="600" value="300" step="10">
                        <span class="range-value" id="maxDistanceVal">300</span>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Overflow</label>
                    <div class="controls">
                        <input type="range" id="overflow" min="0" max="500" value="0" step="10">
                        <span class="range-value" id="overflowVal">0</span>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h3>Text</h3>
                <div class="setting-row">
                    <label>Heading</label>
                    <div class="controls">
                        <input type="text" id="h1Text" placeholder="Heading text">
                    </div>
                </div>
                <div class="setting-row">
                    <label>Heading Size</label>
                    <div class="controls">
                        <input type="range" id="h1Size" min="1" max="8" value="4" step="0.5">
                        <span class="range-value" id="h1SizeVal">4em</span>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Heading Color</label>
                    <div class="controls">
                        <input type="color" id="h1Color" value="#000000">
                    </div>
                </div>
                <div class="setting-row">
                    <label>Paragraph</label>
                    <div class="controls">
                        <input type="text" id="pText" placeholder="Paragraph text">
                    </div>
                </div>
                <div class="setting-row">
                    <label>Paragraph Size</label>
                    <div class="controls">
                        <input type="range" id="pSize" min="0.5" max="4" value="2" step="0.25">
                        <span class="range-value" id="pSizeVal">2rem</span>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Paragraph Color</label>
                    <div class="controls">
                        <input type="color" id="pColor" value="#000000">
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h3>Share</h3>
                <div class="share-row">
                    <input type="text" class="share-url" id="shareUrl" readonly>
                    <button class="copy-btn" id="copyBtn">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── Settings State ─────────────────────────────────────────────

        const DEFAULTS = {
            bgType: 'solid',
            bgColor: '000000',
            bgGradientDir: 'to right',
            gradColor1: '000000',
            gradColor2: '333333',
            gradColor3: '000000',
            nodeCount: 200,
            speed: 0.5,
            nodeColor: 'ffffff',
            maxDistance: 300,
            overflow: 0,
            h1: '',
            h1Size: 4,
            h1Color: '000000',
            p: '',
            pSize: 2,
            pColor: '000000'
        };

        function readSettings() {
            const params = new URLSearchParams(window.location.search);
            return {
                bgType: params.get('bgType') || DEFAULTS.bgType,
                bgColor: params.get('bgColor') || DEFAULTS.bgColor,
                bgGradientDir: params.get('bgGradientDir') || DEFAULTS.bgGradientDir,
                gradColor1: params.get('gradColor1') || DEFAULTS.gradColor1,
                gradColor2: params.get('gradColor2') || DEFAULTS.gradColor2,
                gradColor3: params.get('gradColor3') || DEFAULTS.gradColor3,
                nodeCount: parseInt(params.get('nodeCount'), 10) || DEFAULTS.nodeCount,
                speed: parseFloat(params.get('speed')) || DEFAULTS.speed,
                nodeColor: params.get('nodeColor') || DEFAULTS.nodeColor,
                maxDistance: parseInt(params.get('maxDistance'), 10) || DEFAULTS.maxDistance,
                overflow: parseInt(params.get('overflow'), 10) || DEFAULTS.overflow,
                h1: params.get('h1') || DEFAULTS.h1,
                h1Size: parseFloat(params.get('h1Size')) || DEFAULTS.h1Size,
                h1Color: params.get('h1Color') || DEFAULTS.h1Color,
                p: params.get('p') || DEFAULTS.p,
                pSize: parseFloat(params.get('pSize')) || DEFAULTS.pSize,
                pColor: params.get('pColor') || DEFAULTS.pColor
            };
        }

        function writeURL(settings) {
            const params = new URLSearchParams();
            for (const [key, val] of Object.entries(settings)) {
                if (val !== '' && val !== DEFAULTS[key]) {
                    params.set(key, val);
                }
            }
            const qs = params.toString();
            const url = window.location.pathname + (qs ? '?' + qs : '');
            history.replaceState(null, '', url);
            document.getElementById('shareUrl').value = window.location.href;
        }

        // ─── Network Visualization ──────────────────────────────────────

        class NetworkVisualization {
            static SLIGHT_RANDOM_MOVEMENT_FACTOR = 0.02;
            static NODE_RADIUS_MIN = 2;
            static NODE_RADIUS_MAX = 4;
            static NODE_OPACITY_MIN = 0.5;
            static NODE_OPACITY_MAX = 1;

            constructor(settings) {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.nodes = [];
                this.settings = settings;
                this.init();
                this.createNodes();
                this.animate();
            }

            init() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                window.addEventListener('resize', () => {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                });
            }

            createNodes() {
                this.nodes = [];
                const color = '#' + this.settings.nodeColor;
                const pad = this.settings.overflow;
                for (let i = 0; i < this.settings.nodeCount; i++) {
                    const speed = this.settings.speed;
                    this.nodes.push({
                        x: -pad + Math.random() * (this.canvas.width + 2 * pad),
                        y: -pad + Math.random() * (this.canvas.height + 2 * pad),
                        vx: (Math.random() - 0.5) * speed,
                        vy: (Math.random() - 0.5) * speed,
                        radius: Math.random() * NetworkVisualization.NODE_RADIUS_MAX + NetworkVisualization.NODE_RADIUS_MIN,
                        opacity: Math.random() * NetworkVisualization.NODE_OPACITY_MAX + NetworkVisualization.NODE_OPACITY_MIN,
                        color: color
                    });
                }
            }

            updateSettings(newSettings) {
                const needRecreate = (
                    newSettings.nodeCount !== this.settings.nodeCount ||
                    newSettings.nodeColor !== this.settings.nodeColor
                );
                const speedChanged = newSettings.speed !== this.settings.speed;
                this.settings = newSettings;

                if (needRecreate) {
                    this.createNodes();
                } else if (speedChanged) {
                    const maxVel = newSettings.speed;
                    this.nodes.forEach(node => {
                        node.vx = (Math.random() - 0.5) * maxVel;
                        node.vy = (Math.random() - 0.5) * maxVel;
                    });
                }
            }

            updateNodes() {
                const maxVel = this.settings.speed;
                this.nodes.forEach(node => {
                    node.x += node.vx;
                    node.y += node.vy;

                    const pad = this.settings.overflow;
                    if (node.x <= -pad || node.x >= this.canvas.width + pad) {
                        node.vx *= -1;
                        node.x = Math.max(-pad, Math.min(this.canvas.width + pad, node.x));
                    }
                    if (node.y <= -pad || node.y >= this.canvas.height + pad) {
                        node.vy *= -1;
                        node.y = Math.max(-pad, Math.min(this.canvas.height + pad, node.y));
                    }

                    node.vx += (Math.random() - 0.5) * NetworkVisualization.SLIGHT_RANDOM_MOVEMENT_FACTOR;
                    node.vy += (Math.random() - 0.5) * NetworkVisualization.SLIGHT_RANDOM_MOVEMENT_FACTOR;

                    node.vx = Math.max(-maxVel, Math.min(maxVel, node.vx));
                    node.vy = Math.max(-maxVel, Math.min(maxVel, node.vy));
                });
            }

            drawEdges() {
                const maxDist = this.settings.maxDistance;
                const nc = '#' + this.settings.nodeColor;
                const r = parseInt(nc.slice(1, 3), 16);
                const g = parseInt(nc.slice(3, 5), 16);
                const b = parseInt(nc.slice(5, 7), 16);

                this.ctx.globalAlpha = 0.3;
                for (let i = 0; i < this.nodes.length; i++) {
                    for (let j = i + 1; j < this.nodes.length; j++) {
                        const n1 = this.nodes[i];
                        const n2 = this.nodes[j];
                        const dx = n2.x - n1.x;
                        const dy = n2.y - n1.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < maxDist) {
                            const opacity = 1 - (distance / maxDist);
                            this.ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${opacity * 0.5})`;
                            this.ctx.lineWidth = opacity * 2;
                            this.ctx.beginPath();
                            this.ctx.moveTo(n1.x, n1.y);
                            this.ctx.lineTo(n2.x, n2.y);
                            this.ctx.stroke();
                        }
                    }
                }
            }

            drawNodes() {
                this.nodes.forEach(node => {
                    this.ctx.globalAlpha = node.opacity;
                    this.ctx.shadowColor = node.color;
                    this.ctx.shadowBlur = 15;
                    this.ctx.fillStyle = node.color;
                    this.ctx.beginPath();
                    this.ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                    this.ctx.fill();

                    this.ctx.shadowBlur = 0;
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    this.ctx.beginPath();
                    this.ctx.arc(node.x, node.y, node.radius * 0.4, 0, Math.PI * 2);
                    this.ctx.fill();
                });
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.updateNodes();
                this.drawEdges();
                this.drawNodes();
                requestAnimationFrame(() => this.animate());
            }
        }

        // ─── Apply Settings to DOM ──────────────────────────────────────

        function applyBackground(settings) {
            if (settings.bgType === 'gradient') {
                const c1 = '#' + settings.gradColor1;
                const c2 = '#' + settings.gradColor2;
                const c3 = '#' + settings.gradColor3;
                if (settings.bgGradientDir === 'circle') {
                    document.body.style.background = `radial-gradient(circle, ${c1} 0%, ${c2} 50%, ${c3} 100%)`;
                } else {
                    document.body.style.background = `linear-gradient(${settings.bgGradientDir}, ${c1} 0%, ${c2} 50%, ${c3} 100%)`;
                }
            } else {
                document.body.style.background = '#' + settings.bgColor;
            }
        }

        function applyText(settings) {
            const h1El = document.querySelector('.content h1');
            const pEl = document.querySelector('.content p');

            h1El.textContent = settings.h1;
            h1El.style.fontSize = settings.h1Size + 'em';
            h1El.style.color = '#' + settings.h1Color;

            pEl.textContent = settings.p;
            pEl.style.fontSize = settings.pSize + 'rem';
            pEl.style.color = '#' + settings.pColor;
        }

        // ─── Populate Modal from Settings ───────────────────────────────

        function populateModal(settings) {
            document.getElementById('bgType').value = settings.bgType;
            document.getElementById('bgColor').value = '#' + settings.bgColor;
            document.getElementById('bgGradientDir').value = settings.bgGradientDir;
            document.getElementById('gradColor1').value = '#' + settings.gradColor1;
            document.getElementById('gradColor2').value = '#' + settings.gradColor2;
            document.getElementById('gradColor3').value = '#' + settings.gradColor3;
            document.getElementById('nodeCount').value = settings.nodeCount;
            document.getElementById('nodeCountVal').textContent = settings.nodeCount;
            document.getElementById('speed').value = settings.speed;
            document.getElementById('speedVal').textContent = settings.speed;
            document.getElementById('nodeColor').value = '#' + settings.nodeColor;
            document.getElementById('maxDistance').value = settings.maxDistance;
            document.getElementById('maxDistanceVal').textContent = settings.maxDistance;
            document.getElementById('overflow').value = settings.overflow;
            document.getElementById('overflowVal').textContent = settings.overflow;
            document.getElementById('h1Text').value = settings.h1;
            document.getElementById('h1Size').value = settings.h1Size;
            document.getElementById('h1SizeVal').textContent = settings.h1Size + 'em';
            document.getElementById('h1Color').value = '#' + settings.h1Color;
            document.getElementById('pText').value = settings.p;
            document.getElementById('pSize').value = settings.pSize;
            document.getElementById('pSizeVal').textContent = settings.pSize + 'rem';
            document.getElementById('pColor').value = '#' + settings.pColor;

            toggleGradientUI(settings.bgType);
        }

        function toggleGradientUI(type) {
            document.getElementById('bgColorRow').style.display = type === 'solid' ? 'flex' : 'none';
            document.getElementById('gradientSection').style.display = type === 'gradient' ? 'block' : 'none';
        }

        // ─── Read Settings from Modal ───────────────────────────────────

        function readModal() {
            return {
                bgType: document.getElementById('bgType').value,
                bgColor: document.getElementById('bgColor').value.replace('#', ''),
                bgGradientDir: document.getElementById('bgGradientDir').value,
                gradColor1: document.getElementById('gradColor1').value.replace('#', ''),
                gradColor2: document.getElementById('gradColor2').value.replace('#', ''),
                gradColor3: document.getElementById('gradColor3').value.replace('#', ''),
                nodeCount: parseInt(document.getElementById('nodeCount').value, 10),
                speed: parseFloat(document.getElementById('speed').value),
                nodeColor: document.getElementById('nodeColor').value.replace('#', ''),
                maxDistance: parseInt(document.getElementById('maxDistance').value, 10),
                overflow: parseInt(document.getElementById('overflow').value, 10),
                h1: document.getElementById('h1Text').value,
                h1Size: parseFloat(document.getElementById('h1Size').value),
                h1Color: document.getElementById('h1Color').value.replace('#', ''),
                p: document.getElementById('pText').value,
                pSize: parseFloat(document.getElementById('pSize').value),
                pColor: document.getElementById('pColor').value.replace('#', '')
            };
        }

        // ─── Init ───────────────────────────────────────────────────────

        let settings = readSettings();
        const network = new NetworkVisualization(settings);

        applyBackground(settings);
        applyText(settings);
        populateModal(settings);
        writeURL(settings);

        // ─── Live Updates from Modal ────────────────────────────────────

        function onSettingChange() {
            settings = readModal();

            document.getElementById('nodeCountVal').textContent = settings.nodeCount;
            document.getElementById('speedVal').textContent = settings.speed;
            document.getElementById('maxDistanceVal').textContent = settings.maxDistance;
            document.getElementById('overflowVal').textContent = settings.overflow;
            document.getElementById('h1SizeVal').textContent = settings.h1Size + 'em';
            document.getElementById('pSizeVal').textContent = settings.pSize + 'rem';

            toggleGradientUI(settings.bgType);
            applyBackground(settings);
            applyText(settings);
            network.updateSettings(settings);
            writeURL(settings);
        }

        const modal = document.getElementById('settingsModal');
        modal.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', onSettingChange);
        });

        // ─── Triple-Click Toggle ────────────────────────────────────────

        const clickTimes = [];
        const backdrop = document.getElementById('settingsBackdrop');

        document.addEventListener('click', (e) => {
            if (backdrop.contains(e.target)) return;

            const now = Date.now();
            clickTimes.push(now);
            while (clickTimes.length > 3) clickTimes.shift();

            if (clickTimes.length === 3 && (now - clickTimes[0]) < 500) {
                clickTimes.length = 0;
                backdrop.classList.toggle('open');
            }
        });

        document.getElementById('settingsClose').addEventListener('click', () => {
            backdrop.classList.remove('open');
        });

        backdrop.addEventListener('click', (e) => {
            if (e.target === backdrop) {
                backdrop.classList.remove('open');
            }
        });

        // ─── Copy URL ───────────────────────────────────────────────────

        document.getElementById('copyBtn').addEventListener('click', () => {
            const urlField = document.getElementById('shareUrl');
            navigator.clipboard.writeText(urlField.value).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
            });
        });

        // ─── Prevent Context Menu & Selection ───────────────────────────

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => {
            if (backdrop.classList.contains('open')) return;
            e.preventDefault();
        });

        // ─── Service Worker Registration ────────────────────────────────

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
