<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM26 — Live Background</title>
  <meta name="description" content="DIY Berlin Halfmarathon pic.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100dvh;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    video {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    #startBtn {
      position: absolute;
      z-index: 10;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 40px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: #D04A02;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    #startBtn:hover { background: #E8692A; transform: translate(-50%, -50%) scale(1.04); }
    #startBtn:active { transform: translate(-50%, -50%) scale(0.97); }

    #status {
      position: absolute;
      z-index: 10;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #status.visible { opacity: 1; }

    .overlay-btn {
      position: absolute;
      z-index: 10;
      width: 44px;
      height: 44px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .overlay-btn:hover { background: rgba(255,255,255,0.15); }

    #flipBtn { top: 16px; right: 16px; }

    #captureBtn {
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid #fff;
      background: rgba(255,255,255,0.2);
      font-size: 28px;
      transition: background 0.2s, transform 0.15s;
    }
    #captureBtn:hover { background: rgba(255,255,255,0.35); }
    #captureBtn:active { transform: translateX(-50%) scale(0.9); }

    .flash {
      animation: flash 0.3s ease-out;
    }
    @keyframes flash {
      0% { filter: brightness(2); }
      100% { filter: brightness(1); }
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="output"></canvas>
    <video id="webcam" autoplay playsinline></video>
    <button id="startBtn">Start Camera</button>
    <button id="flipBtn" class="overlay-btn" title="Flip camera">&#x1F504;</button>
    <button id="captureBtn" class="overlay-btn" title="Capture photo">&#x1F4F7;</button>
    <div id="status"></div>
  </div>

  <script type="module">
    import { ImageSegmenter, FilesetResolver } from
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

    const video    = document.getElementById("webcam");
    const canvas   = document.getElementById("output");
    const ctx      = canvas.getContext("2d", { willReadFrequently: true });
    const startBtn = document.getElementById("startBtn");
    const flipBtn  = document.getElementById("flipBtn");
    const captureBtn = document.getElementById("captureBtn");
    const statusEl = document.getElementById("status");

    const bgImg = new Image();
    bgImg.src = "bg.png";

    let segmenter = null;
    let running = false;
    let facingMode = "user";

    const offscreen = document.createElement("canvas");
    const offCtx = offscreen.getContext("2d", { willReadFrequently: true });

    const maskCanvas = document.createElement("canvas");
    const maskCtx = maskCanvas.getContext("2d", { willReadFrequently: true });

    let prevMask = null;
    const TEMPORAL_BLEND = 0.6;

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.add("visible");
    }
    function hideStatus() {
      statusEl.classList.remove("visible");
    }

    async function initSegmenter() {
      showStatus("Loading AI model…");
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
      );
      segmenter = await ImageSegmenter.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        outputCategoryMask: false,
        outputConfidenceMasks: true
      });
      hideStatus();
    }

    async function startCamera() {
      startBtn.style.display = "none";
      showStatus("Requesting camera…");

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      offscreen.width  = video.videoWidth;
      offscreen.height = video.videoHeight;
      maskCanvas.width  = video.videoWidth;
      maskCanvas.height = video.videoHeight;
      prevMask = null;

      flipBtn.style.display = "flex";
      captureBtn.style.display = "flex";

      if (!segmenter) await initSegmenter();
      hideStatus();
      running = true;
      requestAnimationFrame(renderLoop);
    }

    let lastTime = -1;

    function renderLoop() {
      if (!running) return;

      const now = performance.now();
      if (video.currentTime === lastTime) {
        requestAnimationFrame(renderLoop);
        return;
      }
      lastTime = video.currentTime;

      segmenter.segmentForVideo(video, now, (result) => {
        const mask = result.confidenceMasks[0];
        const w = canvas.width;
        const h = canvas.height;
        const rawMask = mask.getAsFloat32Array();

        const smoothed = new Float32Array(rawMask.length);
        if (prevMask) {
          for (let i = 0; i < rawMask.length; i++) {
            smoothed[i] = prevMask[i] * TEMPORAL_BLEND + rawMask[i] * (1 - TEMPORAL_BLEND);
          }
        } else {
          smoothed.set(rawMask);
        }
        prevMask = smoothed;

        const maskImg = maskCtx.createImageData(w, h);
        const md = maskImg.data;
        for (let i = 0; i < smoothed.length; i++) {
          const v = Math.round(Math.min(Math.max(smoothed[i] * 1.1 - 0.05, 0), 1) * 255);
          md[i * 4] = v;
          md[i * 4 + 1] = v;
          md[i * 4 + 2] = v;
          md[i * 4 + 3] = 255;
        }
        maskCtx.putImageData(maskImg, 0, 0);

        maskCtx.filter = "blur(4px)";
        maskCtx.drawImage(maskCanvas, 0, 0);
        maskCtx.filter = "none";

        offCtx.save();
        if (facingMode === "user") {
          offCtx.translate(w, 0);
          offCtx.scale(-1, 1);
        }
        offCtx.drawImage(video, 0, 0, w, h);
        offCtx.restore();

        const frame = offCtx.getImageData(0, 0, w, h);
        const pixels = frame.data;
        const blurred = maskCtx.getImageData(0, 0, w, h).data;

        for (let i = 0; i < smoothed.length; i++) {
          pixels[i * 4 + 3] = blurred[i * 4];
        }
        offCtx.putImageData(frame, 0, 0);

        ctx.clearRect(0, 0, w, h);
        drawBackground(w, h);
        ctx.drawImage(offscreen, 0, 0, w, h);
      });

      requestAnimationFrame(renderLoop);
    }

    function drawBackground(w, h) {
      if (!bgImg.complete) return;
      const imgR = bgImg.naturalWidth / bgImg.naturalHeight;
      const canR = w / h;
      let sw, sh, sx, sy;
      if (canR > imgR) {
        sw = bgImg.naturalWidth;
        sh = sw / canR;
        sx = 0;
        sy = (bgImg.naturalHeight - sh) / 2;
      } else {
        sh = bgImg.naturalHeight;
        sw = sh * canR;
        sy = 0;
        sx = (bgImg.naturalWidth - sw) / 2;
      }
      ctx.drawImage(bgImg, sx, sy, sw, sh, 0, 0, w, h);
    }

    flipBtn.addEventListener("click", async () => {
      running = false;
      const tracks = video.srcObject?.getTracks();
      tracks?.forEach(t => t.stop());
      facingMode = facingMode === "user" ? "environment" : "user";
      await startCamera();
    });

    captureBtn.addEventListener("click", () => {
      canvas.classList.add("flash");
      canvas.addEventListener("animationend", () => canvas.classList.remove("flash"), { once: true });

      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `hm26-${Date.now()}.png`;
        a.click();
        URL.revokeObjectURL(url);
      }, "image/png");
    });

    startBtn.addEventListener("click", startCamera);
  </script>
</body>
</html>
