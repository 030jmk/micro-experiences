<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Just a bunch of bouncing balls with your face and/or hands.">

    <title>Bouncing Balls</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="camera-bg"></canvas>

    <canvas id="projection-canvas"></canvas>
    <canvas id="debug-canvas"></canvas>
    <canvas id="calibration-canvas"></canvas>

    <!-- Settings Panel (triple-click to open) -->
    <div id="settings-overlay">
        <div id="settings-panel">
            <h2>Camera</h2>
            <div class="setting-row">
                <label>Camera Background</label>
                <div class="toggle">
                    <input type="checkbox" id="opt-camera-bg">
                    <span class="track"></span>
                </div>
            </div>
            <div class="setting-row">
                <label>Camera Opacity</label>
                <input type="range" id="opt-camera-opacity" min="5" max="100" value="35">
                <span class="val" id="val-camera-opacity">35%</span>
            </div>
            <div class="setting-row">
                <label>Mirror Camera</label>
                <div class="toggle">
                    <input type="checkbox" id="opt-mirror" checked>
                    <span class="track"></span>
                </div>
            </div>

            <h2>Physics</h2>
            <div class="setting-row">
                <label>Gravity</label>
                <input type="range" id="opt-gravity" min="0" max="300" value="100">
                <span class="val" id="val-gravity">1.0</span>
            </div>
            <div class="setting-row">
                <label>Ball Radius</label>
                <input type="range" id="opt-ball-radius" min="2" max="30" value="8">
                <span class="val" id="val-ball-radius">8</span>
            </div>
            <div class="setting-row">
                <label>Spawn Rate</label>
                <input type="range" id="opt-spawn-rate" min="20" max="500" value="200">
                <span class="val" id="val-spawn-rate">200ms</span>
            </div>
            <div class="setting-row">
                <label>Max Balls</label>
                <input type="range" id="opt-max-balls" min="10" max="1000" value="150" step="10">
                <span class="val" id="val-max-balls">150</span>
            </div>
            <div class="setting-row">
                <label>Bounciness</label>
                <input type="range" id="opt-restitution" min="0" max="100" value="70">
                <span class="val" id="val-restitution">0.7</span>
            </div>

            <div class="setting-row" style="margin-bottom:2px">
                <label>Ball Colors</label>
            </div>
            <div class="ball-colors" id="ball-color-list">
                <div class="ball-color-row">
                    <input type="color" id="opt-ball-color-0" value="#4285F4">
                    <span style="font-size:12px;color:#888;flex:1">Blue</span>
                    <div class="ball-color-toggle"><input type="checkbox" id="opt-ball-color-on-0" checked><span class="mini-track"></span></div>
                </div>
                <div class="ball-color-row">
                    <input type="color" id="opt-ball-color-1" value="#EA4335">
                    <span style="font-size:12px;color:#888;flex:1">Red</span>
                    <div class="ball-color-toggle"><input type="checkbox" id="opt-ball-color-on-1" checked><span class="mini-track"></span></div>
                </div>
                <div class="ball-color-row">
                    <input type="color" id="opt-ball-color-2" value="#FBBC05">
                    <span style="font-size:12px;color:#888;flex:1">Yellow</span>
                    <div class="ball-color-toggle"><input type="checkbox" id="opt-ball-color-on-2" checked><span class="mini-track"></span></div>
                </div>
                <div class="ball-color-row">
                    <input type="color" id="opt-ball-color-3" value="#34A853">
                    <span style="font-size:12px;color:#888;flex:1">Green</span>
                    <div class="ball-color-toggle"><input type="checkbox" id="opt-ball-color-on-3" checked><span class="mini-track"></span></div>
                </div>
                <div class="ball-color-row">
                    <input type="color" id="opt-ball-color-4" value="#FF6644">
                    <span style="font-size:12px;color:#888;flex:1">Orange</span>
                    <div class="ball-color-toggle"><input type="checkbox" id="opt-ball-color-on-4" checked><span class="mini-track"></span></div>
                </div>
            </div>

            <h2>Detection</h2>
            <div class="setting-row">
                <label>Mode</label>
                <select id="opt-detect-mode">
                    <option value="hands" selected>Hand Tracking</option>
                    <option value="face">Face Tracking</option>
                    <option value="hands+face">Hand + Face</option>
                </select>
            </div>
            <div id="tracking-status" class="settings-hint" style="margin-top:4px;color:#666">Loading models...</div>

            <div id="tracking-controls" style="display:block">
                <div class="setting-row">
                    <label>Show Overlay</label>
                    <div class="toggle">
                        <input type="checkbox" id="opt-show-overlay" checked>
                        <span class="track"></span>
                    </div>
                </div>
                <div id="hand-controls">
                    <div class="setting-row">
                        <label>Max Hands</label>
                        <input type="range" id="opt-max-hands" min="1" max="6" value="4">
                        <span class="val" id="val-max-hands">4</span>
                    </div>
                    <div class="setting-row">
                        <label>Hand Padding</label>
                        <input type="range" id="opt-hand-padding" min="0" max="60" value="20">
                        <span class="val" id="val-hand-padding">20px</span>
                    </div>
                    <div class="setting-row">
                        <label>Finger Thickness</label>
                        <input type="range" id="opt-finger-thickness" min="8" max="50" value="18">
                        <span class="val" id="val-finger-thickness">18px</span>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Tracking FPS</label>
                    <input type="range" id="opt-tracking-fps" min="5" max="30" value="15">
                    <span class="val" id="val-tracking-fps">15</span>
                </div>
            </div>

            <h2>Projection</h2>
            <div class="setting-row">
                <label>Auto (use window size)</label>
                <div class="toggle">
                    <input type="checkbox" id="opt-auto-size" checked>
                    <span class="track"></span>
                </div>
            </div>
            <div id="manual-size-controls" style="display:none">
                <div class="setting-row">
                    <label>Width</label>
                    <input type="number" id="opt-proj-width" min="320" max="7680" value="1920" style="width:80px;padding:4px 6px;background:#222;color:#ccc;border:1px solid #444;border-radius:6px;font-size:13px;text-align:right;">
                    <span class="val">px</span>
                </div>
                <div class="setting-row">
                    <label>Height</label>
                    <input type="number" id="opt-proj-height" min="240" max="4320" value="1080" style="width:80px;padding:4px 6px;background:#222;color:#ccc;border:1px solid #444;border-radius:6px;font-size:13px;text-align:right;">
                    <span class="val">px</span>
                </div>
            </div>

            <div class="setting-actions">
                <button id="btn-clear-balls">Clear Balls</button>
                <button class="primary" id="btn-close-settings">Close</button>
            </div>
            <div class="settings-hint">Triple-click anywhere to reopen</div>
        </div>
    </div>

    <script src="lib/decomp.min.js"></script>
    <script src="lib/matter.min.js"></script>
    <!-- OpenCV is loaded on-demand when user switches to a CV-based detection mode -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
