<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Just a bunch of bouncing balls with your face and/or hands.">

    <title>Bouncing Balls</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="camera-bg"></canvas>

    <canvas id="projection-canvas"></canvas>
    <canvas id="debug-canvas"></canvas>
    <canvas id="calibration-canvas"></canvas>

    <!-- Settings Panel (triple-click to open) -->
    <div id="settings-overlay">
        <div id="settings-panel">
            <h2>Camera</h2>
            <div class="setting-row">
                <label>Camera Background</label>
                <div class="toggle">
                    <input type="checkbox" id="opt-camera-bg">
                    <span class="track"></span>
                </div>
            </div>
            <div class="setting-row">
                <label>Camera Opacity</label>
                <input type="range" id="opt-camera-opacity" min="5" max="100" value="35">
                <span class="val" id="val-camera-opacity">35%</span>
            </div>
            <div class="setting-row">
                <label>Mirror Camera</label>
                <div class="toggle">
                    <input type="checkbox" id="opt-mirror" checked>
                    <span class="track"></span>
                </div>
            </div>

            <h2>Physics</h2>
            <div class="setting-row">
                <label>Gravity</label>
                <input type="range" id="opt-gravity" min="0" max="300" value="100">
                <span class="val" id="val-gravity">1.0</span>
            </div>
            <div class="setting-row">
                <label>Ball Radius</label>
                <input type="range" id="opt-ball-radius" min="2" max="30" value="8">
                <span class="val" id="val-ball-radius">8</span>
            </div>
            <div class="setting-row">
                <label>Spawn Rate</label>
                <input type="range" id="opt-spawn-rate" min="20" max="500" value="200">
                <span class="val" id="val-spawn-rate">200ms</span>
            </div>
            <div class="setting-row">
                <label>Max Balls</label>
                <input type="range" id="opt-max-balls" min="10" max="1000" value="150" step="10">
                <span class="val" id="val-max-balls">150</span>
            </div>
            <div class="setting-row">
                <label>Bounciness</label>
                <input type="range" id="opt-restitution" min="0" max="100" value="70">
                <span class="val" id="val-restitution">0.7</span>
            </div>

            <h2>Detection Mode</h2>
            <div class="setting-row">
                <label>Mode</label>
                <select id="opt-detect-mode">
                    <option value="hands" selected>Hand Tracking</option>
                    <option value="face">Face Tracking</option>
                    <option value="hands+face">Hand + Face</option>
                    <option value="bg-sub">Background Subtraction</option>
                    <option value="hsv">HSV Color Detection</option>
                </select>
            </div>
            <div id="tracking-status" class="settings-hint" style="margin-top:4px;color:#666">Loading models…</div>

            <div id="tracking-controls" style="display:block">
                <div class="setting-row">
                    <label>Show Overlay</label>
                    <div class="toggle">
                        <input type="checkbox" id="opt-show-overlay" checked>
                        <span class="track"></span>
                    </div>
                </div>
                <div id="hand-controls">
                    <div class="setting-row">
                        <label>Max Hands</label>
                        <input type="range" id="opt-max-hands" min="1" max="6" value="4">
                        <span class="val" id="val-max-hands">4</span>
                    </div>
                    <div class="setting-row">
                        <label>Hand Padding</label>
                        <input type="range" id="opt-hand-padding" min="0" max="60" value="20">
                        <span class="val" id="val-hand-padding">20px</span>
                    </div>
                    <div class="setting-row">
                        <label>Finger Thickness</label>
                        <input type="range" id="opt-finger-thickness" min="8" max="50" value="18">
                        <span class="val" id="val-finger-thickness">18px</span>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Tracking FPS</label>
                    <input type="range" id="opt-tracking-fps" min="5" max="30" value="15">
                    <span class="val" id="val-tracking-fps">15</span>
                </div>
            </div>

            <div id="bg-sub-controls" style="display:none">
                <div class="setting-row">
                    <label>Adaptive Threshold</label>
                    <div class="toggle">
                        <input type="checkbox" id="opt-adaptive" checked>
                        <span class="track"></span>
                    </div>
                </div>
                <div class="setting-row" id="row-diff-threshold">
                    <label>Diff Threshold</label>
                    <input type="range" id="opt-diff-threshold" min="5" max="120" value="30">
                    <span class="val" id="val-diff-threshold">30</span>
                </div>
                <div class="setting-row" id="row-adaptive-block">
                    <label>Block Size</label>
                    <input type="range" id="opt-adaptive-block" min="3" max="99" value="25" step="2">
                    <span class="val" id="val-adaptive-block">25</span>
                </div>
                <div class="setting-row" id="row-adaptive-c">
                    <label>Sensitivity (C)</label>
                    <input type="range" id="opt-adaptive-c" min="1" max="30" value="8">
                    <span class="val" id="val-adaptive-c">8</span>
                </div>
                <div class="setting-row">
                    <label>Diff Blur</label>
                    <input type="range" id="opt-diff-blur" min="1" max="31" value="11" step="2">
                    <span class="val" id="val-diff-blur">11</span>
                </div>
                <div class="setting-row">
                    <label>Dilate Size</label>
                    <input type="range" id="opt-dilate" min="0" max="25" value="9" step="2">
                    <span class="val" id="val-dilate">9</span>
                </div>
                <div class="setting-row">
                    <label>Max Aspect Ratio</label>
                    <input type="range" id="opt-aspect" min="1" max="15" value="5">
                    <span class="val" id="val-aspect">5</span>
                </div>
                <div class="setting-row">
                    <label>Ref. Learn Rate</label>
                    <input type="range" id="opt-learn-rate" min="0" max="50" value="0">
                    <span class="val" id="val-learn-rate">0%</span>
                </div>
                <div class="setting-actions" style="margin-top:8px;padding-top:8px;border-top:none">
                    <button id="btn-capture-ref">Capture Reference</button>
                    <button id="btn-clear-ref" disabled>Clear Reference</button>
                </div>
                <div id="ref-status" class="settings-hint" style="margin-top:6px;color:#666">No reference captured</div>
            </div>

            <h2>Vision</h2>
            <div class="setting-row">
                <label>Smoothing</label>
                <input type="range" id="opt-smoothing" min="5" max="95" value="30">
                <span class="val" id="val-smoothing">0.30</span>
            </div>
            <div class="setting-row">
                <label>Min Contour Area</label>
                <input type="range" id="opt-min-area" min="200" max="10000" value="2000" step="100">
                <span class="val" id="val-min-area">2000</span>
            </div>
            <div class="setting-row">
                <label>Hysteresis Frames</label>
                <input type="range" id="opt-hysteresis" min="1" max="15" value="3">
                <span class="val" id="val-hysteresis">3</span>
            </div>

            <h2>Debug</h2>
            <div class="setting-row">
                <label>Show Wireframes</label>
                <div class="toggle">
                    <input type="checkbox" id="opt-wireframes">
                    <span class="track"></span>
                </div>
            </div>
            <div class="setting-row">
                <label>Debug Mask View</label>
                <div class="toggle">
                    <input type="checkbox" id="opt-debug">
                    <span class="track"></span>
                </div>
            </div>

            <div class="setting-actions">
                <button id="btn-calibrate">Calibrate</button>
                <button id="btn-clear-balls">Clear Balls</button>
                <button class="primary" id="btn-close-settings">Close</button>
            </div>
            <div class="settings-hint">Triple-click anywhere to reopen</div>
        </div>
    </div>

    <script src="lib/decomp.min.js"></script>
    <script src="lib/matter.min.js"></script>
    <!-- OpenCV is loaded on-demand when user switches to a CV-based detection mode -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
